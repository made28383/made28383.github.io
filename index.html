<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Realistlikud Interaktiivsed Lilled</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#120000;
    font-family:Arial,sans-serif;
}

body{
    background:
        radial-gradient(circle at top,
            #5f0000 0%,
            #260000 40%,
            #0d0000 100%);
}

canvas{
    display:block;
}

.text{
    position:absolute;
    top:20px;
    left:20px;
    color:rgba(255,255,255,0.55);
    font-size:14px;
    letter-spacing:1px;
    pointer-events:none;
    z-index:10;
    user-select:none;
}
</style>
</head>
<body>

<div class="text">
    Liiguta hiirt lillede kohal ✿
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w, h, dpr;

function resize(){

    dpr = window.devicePixelRatio || 1;

    w = window.innerWidth;
    h = window.innerHeight;

    canvas.width = w * dpr;
    canvas.height = h * dpr;

    canvas.style.width = w + "px";
    canvas.style.height = h + "px";

    ctx.setTransform(dpr,0,0,dpr,0,0);

    createFlowers();
}

window.addEventListener("resize", resize);

const mouse = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2
};

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

window.addEventListener("touchmove", e => {
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
}, { passive:true });

class Flower{

    constructor(x,y,size){

        this.x = x;
        this.y = y;

        this.baseSize = size;
        this.size = size;

        this.rotation =
            Math.random() * Math.PI * 2;

        this.rotationSpeed =
            (Math.random() - 0.5) * 0.002;

        this.petals =
            8 + Math.floor(Math.random() * 6);

        this.floatOffset =
            Math.random() * 1000;

        this.depth =
            0.5 + Math.random() * 1.5;

        this.windOffset =
            Math.random() * Math.PI * 2;

        this.glow =
            0.3 + Math.random() * 0.7;
    }

    drawPetal(angle, pulse){

        ctx.save();

        ctx.rotate(angle);

        const gradient = ctx.createLinearGradient(
            0,
            0,
            0,
            this.size * 1.8
        );

        gradient.addColorStop(
            0,
            "rgba(255,255,255,0.98)"
        );

        gradient.addColorStop(
            0.45,
            "rgba(255,245,245,0.96)"
        );

        gradient.addColorStop(
            1,
            "rgba(255,220,220,0.92)"
        );

        ctx.beginPath();

        ctx.moveTo(0,0);

        ctx.bezierCurveTo(
            this.size * 0.25,
            -this.size * 0.3,

            this.size * 1.0,
            this.size * 0.5,

            0,
            this.size * 1.9
        );

        ctx.bezierCurveTo(
            -this.size * 1.0,
            this.size * 0.5,

            -this.size * 0.25,
            -this.size * 0.3,

            0,
            0
        );

        ctx.fillStyle = gradient;

        ctx.shadowColor =
            `rgba(255,255,255,${0.45 + pulse * 0.4})`;

        ctx.shadowBlur =
            10 + pulse * 16;

        ctx.fill();

        // petal detail
        ctx.strokeStyle =
            "rgba(255,255,255,0.18)";

        ctx.lineWidth = 1;

        ctx.beginPath();

        ctx.moveTo(0,0);

        ctx.quadraticCurveTo(
            0,
            this.size * 0.7,
            0,
            this.size * 1.7
        );

        ctx.stroke();

        ctx.restore();
    }

    draw(time){

        const pulse =
            (Math.sin(time * 0.004 + this.floatOffset)+1)*0.5;

        const sway =
            Math.sin(time * 0.0015 + this.windOffset) * 0.12;

        const floatY =
            Math.sin(time * 0.0018 + this.floatOffset) * 5;

        const parallaxX =
            (mouse.x - w/2) * 0.012 * this.depth;

        const parallaxY =
            (mouse.y - h/2) * 0.012 * this.depth;

        ctx.save();

        ctx.translate(
            this.x + parallaxX,
            this.y + floatY + parallaxY
        );

        ctx.rotate(
            this.rotation +
            sway
        );

        for(let i=0;i<this.petals;i++){

            const angle =
                (Math.PI * 2 / this.petals) * i;

            this.drawPetal(angle,pulse);
        }

        // realistic center
        const centerGradient =
            ctx.createRadialGradient(
                0,0,0,
                0,0,this.size * 0.5
            );

        centerGradient.addColorStop(
            0,
            "#fff8cc"
        );

        centerGradient.addColorStop(
            0.5,
            "#f6d56b"
        );

        centerGradient.addColorStop(
            1,
            "#d89c1e"
        );

        ctx.beginPath();

        ctx.arc(
            0,
            0,
            this.size * 0.35,
            0,
            Math.PI * 2
        );

        ctx.fillStyle = centerGradient;

        ctx.shadowColor =
            "rgba(255,220,120,0.9)";

        ctx.shadowBlur = 18;

        ctx.fill();

        // pollen dots
        for(let i=0;i<12;i++){

            const a = Math.random() * Math.PI * 2;
            const r = Math.random() * this.size * 0.22;

            ctx.beginPath();

            ctx.arc(
                Math.cos(a)*r,
                Math.sin(a)*r,
                1.2,
                0,
                Math.PI * 2
            );

            ctx.fillStyle =
                "rgba(120,60,0,0.45)";

            ctx.fill();
        }

        ctx.restore();
    }

    update(time){

        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;

        const dist = Math.sqrt(dx*dx + dy*dy);

        const radius = 220;

        let target = this.baseSize;

        // palju kiirem ja elavam reaktsioon
        if(dist < radius){

            const power = 1 - dist / radius;

            target =
                this.baseSize +
                power * this.baseSize * 2.8;

            // hiire poole kallutamine
            this.rotation +=
                (dx * 0.00001);
        }

        // väga kiire smooth kasv
        this.size +=
            (target - this.size) * 0.22;

        this.rotation += this.rotationSpeed;

        this.draw(time);
    }
}

class Dust{

    constructor(){

        this.reset();
    }

    reset(){

        this.x = Math.random() * w;
        this.y = Math.random() * h;

        this.size =
            Math.random() * 2 + 0.3;

        this.speed =
            0.15 + Math.random() * 0.6;

        this.alpha =
            0.04 + Math.random() * 0.18;
    }

    update(){

        this.y -= this.speed;

        this.x += Math.sin(this.y * 0.01) * 0.2;

        if(this.y < -10){

            this.y = h + 10;
            this.x = Math.random() * w;
        }

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI * 2
        );

        ctx.fillStyle =
            `rgba(255,255,255,${this.alpha})`;

        ctx.fill();
    }
}

const flowers = [];
const dust = [];

function createFlowers(){

    flowers.length = 0;

    const amount =
        Math.min(
            110,
            Math.floor((w*h)/14000)
        );

    for(let i=0;i<amount;i++){

        flowers.push(
            new Flower(
                Math.random()*w,
                Math.random()*h,
                8 + Math.random()*16
            )
        );
    }

    dust.length = 0;

    for(let i=0;i<120;i++){

        dust.push(new Dust());
    }
}

function backgroundGlow(){

    const gradient =
        ctx.createRadialGradient(
            mouse.x,
            mouse.y,
            0,
            mouse.x,
            mouse.y,
            320
        );

    gradient.addColorStop(
        0,
        "rgba(255,100,100,0.16)"
    );

    gradient.addColorStop(
        0.4,
        "rgba(255,40,40,0.08)"
    );

    gradient.addColorStop(
        1,
        "rgba(255,0,0,0)"
    );

    ctx.fillStyle = gradient;

    ctx.fillRect(0,0,w,h);
}

function animate(time){

    ctx.clearRect(0,0,w,h);

    // cinematic motion blur
    ctx.fillStyle =
        "rgba(10,0,0,0.12)";

    ctx.fillRect(0,0,w,h);

    backgroundGlow();

    dust.forEach(d => d.update());

    flowers.forEach(flower => {
        flower.update(time);
    });

    requestAnimationFrame(animate);
}

resize();
animate();
</script>

</body>
</html>
