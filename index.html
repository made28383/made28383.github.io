<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Draggable MP3 Player</title>
<style>
  body {
    background: #fafafa;
    margin: 0;
    height: 200vh;
    font-family: sans-serif;
  }

  /* Draggable container */
  #player {
    position: absolute;
    top: 100px;
    left: 100px;
    width: 500px;
    height: 330px;
    cursor: grab;
    user-select: none;
  }

  /* Example placeholder shape until SVG added */
  .player-bg {
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 30%, #ffd2f3, #ff5fb7);
    border-radius: 40% 60% 50% 50%;
    box-shadow: inset 0 6px 12px #ffffffaa, inset 0 -8px 14px #c90067aa,
                0 10px 20px #00000040;
  }
</style>
</head>
<body>

<div id="player">
  <div class="player-bg"></div>
</div>

<script>
// Basic dragging
const player = document.getElementById("player");
let isDown = false;
let offset = [0, 0];

player.addEventListener("mousedown", (e) => {
  isDown = true;
  offset = [player.offsetLeft - e.clientX, player.offsetTop - e.clientY];
  player.style.cursor = "grabbing";
});

window.addEventListener("mouseup", () => {
  isDown = false;
  player.style.cursor = "grab";
});

window.addEventListener("mousemove", (e) => {
  if (!isDown) return;
  player.style.left = e.clientX + offset[0] + "px";
  player.style.top = e.clientY + offset[1] + "px";
});
</script>

</body>
</html>
