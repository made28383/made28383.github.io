<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corrected Realistic MP3 Player</title>
<style>
  body { margin: 0; height: 100vh; background: #1a1a1a; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #player-widget { width: 500px; height: 500px; cursor: grab; user-select: none; }
  .btn-shape { cursor: pointer; transition: 0.1s; transform-origin: center; transform-box: fill-box; }
  .btn-shape:active { transform: scale(0.95); filter: brightness(0.9); }
  
  @keyframes sunRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .playing #sun-group { animation: sunRotate 30s linear infinite; transform-origin: 210px 115px; }
  
  .lcd-text { font-family: 'Courier New', monospace; font-weight: bold; fill: #ffffff; pointer-events: none; }
</style>
</head>
<body>

<div id="player-widget">
<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="puffy" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="4" specularConstant="0.9" specularExponent="25" lighting-color="#ffffff" result="specOut">
        <fePointLight x="-50" y="-100" z="200"/>
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>

    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffb00"/><stop offset="100%" stop-color="#ff9100"/>
    </radialGradient>
    
    <clipPath id="screenArea">
      <path d="M122.19,136.72c-3.46-6.12-1.68-13.4,0-20.23,3.4-13.86,12.37-22.19,15.27-24.81,12.96-11.72,28.03-13.44,37.4-14.5,7.61-.87,29.07-3,50,9.92,11.24,6.94,17.6,15.3,20.99,19.85,4.95,6.64,11.38,15.49,12.21,27.86.31,4.66.63,9.47-2.29,13.74-1.18,1.73-5.28,6.86-23.66,8.02-11.13.7-18.88-.6-30.15-2.29-21.22-3.18-7.48-.64-35.88-4.96-34.6-5.27-40.66-6.87-43.89-12.6Z" />
    </clipPath>
  </defs>

  <path d="M103.01,218.59c-26.84,2.6-45.87,8.38-62.25-3.34-16.75-11.98-18.98-33.85-19.33-39.75-.97-16.29,4.94-36.59,20.49-47.92,16.31-11.89,28.03-2.84,48.72-13.74,21.04-11.1,17.95-25.23,35.18-39.38,25.96-21.3,75.13-23.84,110.58-1.49,5.77,3.64,37.32,24.42,41.76,62.04,4.52,38.31-21.27,75.49-52.2,89.16-35.72,15.78-49.02-12.74-122.95-5.57Z" 
        fill="#e060aa" filter="url(#puffy)" />

  <path d="M117.82,143.97c-2.21-6.71-6.69-23.68,1.27-40.99,15.61-33.96,63.33-34.94,66.77-34.96,28.68-.18,58.84,14.6,72.69,40.99,3.75,7.15,13.89,26.48,6.34,39.38-12.79,21.86-72.31,18.42-147.06-4.42Z" 
        fill="none" stroke="#f48bc4" stroke-width="8" filter="url(#puffy)" />
  <g fill="#999" filter="url(#puffy)">
    <ellipse cx="120" cy="120" rx="3" ry="1.5" transform="rotate(-40 120 120)" />
    <ellipse cx="140" cy="85" rx="3" ry="1.5" transform="rotate(-10 140 85)" />
    <ellipse cx="180" cy="75" rx="3" ry="1.5" />
    <ellipse cx="230" cy="90" rx="3" ry="1.5" transform="rotate(30 230 90)" />
    <ellipse cx="260" cy="130" rx="3" ry="1.5" transform="rotate(60 260 130)" />
  </g>

  <g clip-path="url(#screenArea)">
    <rect width="300" height="300" fill="#000" />
    <g id="sun-group">
      <path d="M210,115 m-40,0 q-10,-20 10,-30 t30,-10 t30,10 t10,30 t-10,30 t-30,10 t-30,-10 t-10,-30" fill="#ff9100" opacity="0.8" transform="scale(1.5) translate(-70, -38)" />
      <circle cx="210" cy="115" r="28" fill="url(#sunGrad)" />
      <path d="M205,110 q5,5 10,0 t5,-5" fill="none" stroke="#aa6600" stroke-width="2" />
    </g>
  </g>

  <path d="M30,180 q50,-40 120,-10 t100,0 t40,50 t-100,40 t-160,-20 z" fill="#b0e0f8" filter="url(#puffy)" />

  <text x="110" y="195" class="lcd-text" font-size="7" fill="#444">LAUL - LAULJA</text>
  <line x1="110" y1="205" x2="190" y2="205" stroke="#ff8800" stroke-width="2" />
  <polygon id="seeker-star" points="0,-4 1,-1 4,0 1,1 0,4 -1,1 -4,0 -1,-1" fill="#ffcc00" transform="translate(140, 205)" />

  <g transform="translate(60, 215)">
    <path d="M0,20 A20,20 0 0,1 40,20" fill="none" stroke="red" stroke-width="2" />
    <path d="M2,20 A18,18 0 0,1 38,20" fill="none" stroke="orange" stroke-width="2" />
    <path d="M4,20 A16,16 0 0,1 36,20" fill="none" stroke="yellow" stroke-width="2" />
    <circle cx="20" cy="5" r="4" fill="#fff" filter="url(#puffy)" class="btn-shape" />
  </g>

  <g filter="url(#puffy)">
    <path class="btn-shape" fill="#f48bc4" d="M185,210 q10,-20 20,0 t-10,20 t-10,-20" /> <circle class="btn-shape" fill="#66ccff" cx="260" cy="220" r="10" /> <circle class="btn-shape" fill="#66ccff" cx="140" cy="180" r="8" /> <path class="btn-shape" fill="#f48bc4" transform="translate(-20,0)" d="M185,210 q10,-20 20,0 t-10,20 t-10,-20" /> </g>

</svg>
</div>

<script>
  const widget = document.getElementById('player-widget');
  let isPlaying = false;
  widget.onclick = (e) => {
    if(e.target.classList.contains('btn-shape')) {
      isPlaying = !isPlaying;
      widget.classList.toggle('playing', isPlaying);
    }
  };
  
  // Basic Drag
  let drag = false, ox, oy;
  widget.onmousedown = (e) => { drag = true; ox = e.clientX - widget.offsetLeft; oy = e.clientY - widget.offsetTop; };
  document.onmousemove = (e) => { if(drag) { widget.style.position='absolute'; widget.style.left=(e.clientX-ox)+'px'; widget.style.top=(e.clientY-oy)+'px'; } };
  document.onmouseup = () => drag = false;
</script>
</body>
</html>
