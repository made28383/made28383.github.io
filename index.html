<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Lillede Mäng</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#120000;
    font-family:Arial,sans-serif;
}

body{
    background:
        radial-gradient(circle at top,
        #5c0000 0%,
        #220000 45%,
        #090000 100%);
}

canvas{
    display:block;
}

.ui{
    position:absolute;
    top:20px;
    left:20px;
    z-index:10;
    color:white;
    user-select:none;
}

.score{
    font-size:28px;
    font-weight:bold;
    margin-bottom:8px;
}

.combo{
    color:#ffbaba;
    font-size:16px;
}

.info{
    position:absolute;
    bottom:20px;
    left:20px;
    color:rgba(255,255,255,0.55);
    font-size:14px;
}

.gameover{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    background:rgba(0,0,0,0.55);
    color:white;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.gameover.show{
    opacity:1;
    pointer-events:auto;
}

.gameover h1{
    font-size:60px;
    margin-bottom:20px;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    background:white;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>

<div class="ui">
    <div class="score">
        Punktid: <span id="score">0</span>
    </div>

    <div class="combo">
        Combo: <span id="combo">x1</span>
    </div>
</div>

<div class="info">
    Korja hiirega säravaid lilli ✿
</div>

<div class="gameover" id="gameover">
    <h1>Mäng Läbi</h1>
    <p style="margin-bottom:20px;">
        Skoor: <span id="finalScore">0</span>
    </p>

    <button onclick="restartGame()">
        Mängi Uuesti
    </button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");
const gameoverEl = document.getElementById("gameover");
const finalScoreEl = document.getElementById("finalScore");

let w,h,dpr;

function resize(){

    dpr = window.devicePixelRatio || 1;

    w = innerWidth;
    h = innerHeight;

    canvas.width = w * dpr;
    canvas.height = h * dpr;

    canvas.style.width = w + "px";
    canvas.style.height = h + "px";

    ctx.setTransform(dpr,0,0,dpr,0,0);
}

resize();

window.addEventListener("resize", resize);

const mouse = {
    x:w/2,
    y:h/2
};

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

let score = 0;
let combo = 1;
let gameTime = 60;
let gameEnded = false;

class Flower{

    constructor(){

        this.reset();
    }

    reset(){

        this.x = Math.random() * w;
        this.y = Math.random() * h;

        this.baseSize =
            14 + Math.random() * 18;

        this.size = this.baseSize;

        this.petals =
            6 + Math.floor(Math.random() * 4);

        this.rotation =
            Math.random() * Math.PI * 2;

        this.speed =
            0.5 + Math.random() * 1.5;

        this.glow =
            Math.random();

        this.collected = false;

        this.life =
            4000 + Math.random() * 4000;

        this.spawnTime =
            performance.now();
    }

    drawPetal(angle){

        ctx.save();

        ctx.rotate(angle);

        ctx.beginPath();

        ctx.moveTo(0,0);

        ctx.bezierCurveTo(
            this.size * 0.3,
            -this.size * 0.2,

            this.size * 0.9,
            this.size * 0.5,

            0,
            this.size * 1.6
        );

        ctx.bezierCurveTo(
            -this.size * 0.9,
            this.size * 0.5,

            -this.size * 0.3,
            -this.size * 0.2,

            0,
            0
        );

        ctx.fillStyle = "white";

        ctx.shadowColor =
            `rgba(255,255,255,${0.6 + this.glow})`;

        ctx.shadowBlur = 12;

        ctx.fill();

        ctx.restore();
    }

    draw(time){

        const pulse =
            (Math.sin(time * 0.006) + 1) * 0.5;

        ctx.save();

        ctx.translate(
            this.x,
            this.y +
            Math.sin(time * 0.001 + this.x) * 4
        );

        ctx.rotate(
            this.rotation +
            time * 0.0003
        );

        for(let i=0;i<this.petals;i++){

            this.drawPetal(
                (Math.PI*2/this.petals)*i
            );
        }

        ctx.beginPath();

        ctx.arc(
            0,
            0,
            this.size * 0.28,
            0,
            Math.PI*2
        );

        ctx.fillStyle = "#ffd966";

        ctx.shadowBlur =
            10 + pulse * 8;

        ctx.fill();

        ctx.restore();
    }

    update(time){

        if(gameEnded) return;

        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;

        const distSq = dx*dx + dy*dy;

        // hover grow
        let target = this.baseSize;

        if(distSq < 170*170){

            target =
                this.baseSize * 1.8;
        }

        this.size +=
            (target - this.size) * 0.25;

        // collect
        if(distSq < (this.size*this.size)){

            this.collect();
        }

        // expire
        if(time - this.spawnTime > this.life){

            combo = 1;
            comboEl.textContent = "x1";

            this.reset();
        }

        this.draw(time);
    }

    collect(){

        score += 10 * combo;

        combo++;

        scoreEl.textContent = score;
        comboEl.textContent = "x" + combo;

        this.reset();
    }
}

class Particle{

    constructor(){

        this.reset();
    }

    reset(){

        this.x = Math.random() * w;
        this.y = Math.random() * h;

        this.size =
            Math.random() * 2;

        this.speed =
            0.2 + Math.random() * 0.5;

        this.alpha =
            0.03 + Math.random() * 0.12;
    }

    update(){

        this.y -= this.speed;

        if(this.y < -5){

            this.y = h + 5;
            this.x = Math.random() * w;
        }

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI*2
        );

        ctx.fillStyle =
            `rgba(255,255,255,${this.alpha})`;

        ctx.fill();
    }
}

const flowers = [];
const particles = [];

function createGame(){

    flowers.length = 0;

    for(let i=0;i<25;i++){

        flowers.push(new Flower());
    }

    particles.length = 0;

    for(let i=0;i<60;i++){

        particles.push(new Particle());
    }
}

function backgroundGlow(){

    const gradient =
        ctx.createRadialGradient(
            mouse.x,
            mouse.y,
            0,
            mouse.x,
            mouse.y,
            220
        );

    gradient.addColorStop(
        0,
        "rgba(255,80,80,0.14)"
    );

    gradient.addColorStop(
        1,
        "rgba(255,0,0,0)"
    );

    ctx.fillStyle = gradient;

    ctx.fillRect(0,0,w,h);
}

function endGame(){

    gameEnded = true;

    finalScoreEl.textContent = score;

    gameoverEl.classList.add("show");
}

function restartGame(){

    score = 0;
    combo = 1;
    gameTime = 60;
    gameEnded = false;

    scoreEl.textContent = 0;
    comboEl.textContent = "x1";

    gameoverEl.classList.remove("show");

    createGame();

    startTimer();
}

let timerInterval;

function startTimer(){

    clearInterval(timerInterval);

    timerInterval = setInterval(() => {

        if(gameEnded) return;

        gameTime--;

        if(gameTime <= 0){

            clearInterval(timerInterval);

            endGame();
        }

    },1000);
}

function drawTimer(){

    ctx.fillStyle =
        "rgba(255,255,255,0.9)";

    ctx.font = "bold 26px Arial";

    ctx.fillText(
        gameTime + "s",
        w - 90,
        40
    );
}

function animate(time){

    ctx.fillStyle =
        "rgba(12,0,0,0.18)";

    ctx.fillRect(0,0,w,h);

    backgroundGlow();

    particles.forEach(p => p.update());

    flowers.forEach(f => {
        f.update(time);
    });

    drawTimer();

    requestAnimationFrame(animate);
}

createGame();
startTimer();
animate();
</script>

</body>
</html>
