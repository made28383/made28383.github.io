<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP3 Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#1a0a2e 0%,#0d1a3a 50%,#1a0a2e 100%);
  overflow:hidden;
  font-family:'Georgia',serif;
}
#player{
  position:fixed;
  left:50%;top:50%;transform:translate(-50%,-50%);
  width:300px;height:300px;
  cursor:grab;
}
#player:active{cursor:grabbing;}
#player.dragging{transition:none;}
#player svg{width:100%;height:100%;overflow:visible;}
.btn-hit{cursor:pointer;}
.btn-hit:hover .btn-face{filter:brightness(1.18);} 
.btn-hit:active .btn-face{filter:brightness(0.82);} 

/* Päikese animatsioon */
#sun { transform-origin: 150px 150px; }
.pulse {
    animation: pulseBeat 1s infinite ease-in-out;
}
@keyframes pulseBeat {
    0% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.3); filter: brightness(1.5); }
    100% { transform: scale(1); filter: brightness(1); }
}
</style>
</head>
<body>

<div id="player">
<svg id="main-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">

<!-- OLEMASOLEV GRAAFIKA -->
<defs>
  <radialGradient id="bodyG" cx="38%" cy="32%" r="60%">
    <stop offset="0%" stop-color="#d3b7ff"/>
    <stop offset="100%" stop-color="#5a3f90"/>
  </radialGradient>
</defs>

<!-- PÄIKE -->
<g id="sun" class="pulse">
    <circle cx="150" cy="150" r="40" fill="#ffdd55" stroke="#ffaa00" stroke-width="6"/>
    <g stroke="#ffcc33" stroke-width="6">
        <line x1="150" y1="95" x2="150" y2="60"/>
        <line x1="150" y1="205" x2="150" y2="240"/>
        <line x1="95" y1="150" x2="60" y2="150"/>
        <line x1="205" y1="150" x2="240" y2="150"/>
        <line x1="110" y1="110" x2="80" y2="80"/>
        <line x1="190" y1="110" x2="220" y2="80"/>
        <line x1="110" y1="190" x2="80" y2="220"/>
        <line x1="190" y1="190" x2="220" y2="220"/>
    </g>
</g>

<!-- LÕPP SVG -->
</svg>
</div>

<script>
// Muusikarütmi põhinev päikese pulseerimine
const audio = new Audio('music.mp3');
let ctx, analyser, dataArray;

function setupAudio() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    const src = ctx.createMediaElementSource(audio);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 128;
    src.connect(analyser);
    analyser.connect(ctx.destination);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
}

function animateSun() {
    requestAnimationFrame(animateSun);
    analyser.getByteFrequencyData(dataArray);
    let bass = dataArray[1];
    let scale = 1 + bass / 200;
    document.getElementById('sun').style.transform = `scale(${scale})`;
}

setupAudio();
audio.play();
animateSun();
</script>

</body>
</html>
