<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sun Rhythm MP3 Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    /* Dark background to show off the transparency and sun glow */
    background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  /* Decorative background text */
  body::before {
    content: 'BACKGROUND CONTENT';
    position: fixed;
    top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.05);
    font-size: 60px; font-weight: 900;
    pointer-events: none;
  }

  #player-widget {
    position: fixed;
    bottom: 40px;
    right: 40px;
    width: 400px;
    height: 400px;
    cursor: grab;
    user-select: none;
    /* 3D front-look tilt */
    transform: perspective(1000px) rotateX(5deg);
    filter: drop-shadow(0 30px 50px rgba(0,0,0,0.8));
    z-index: 9999;
  }
  #player-widget:active { cursor: grabbing; }

  #player-svg { width: 100%; height: 100%; overflow: visible; }

  /* 3D Shading Effects */
  .btn-shape { cursor: pointer; transition: 0.1s; transform-box: fill-box; transform-origin: center; }
  .btn-shape:active { transform: scale(0.92); }

  /* Rhythm Sun Animation */
  @keyframes sunBeat {
    0% { transform: scale(1); filter: url(#sunGlow); }
    50% { transform: scale(1.1); filter: url(#sunGlowStrong); }
    100% { transform: scale(1); filter: url(#sunGlow); }
  }
  .playing #rhythm-sun {
    animation: sunBeat 0.6s infinite ease-in-out;
    transform-origin: center;
  }

  .text-label { pointer-events: none; fill: #4a0028; font-weight: bold; font-family: sans-serif; }
</style>
</head>
<body>

<div id="player-widget">
<svg id="player-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="metal3d" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="0.9" specularExponent="25" lighting-color="#ffccff" result="specOut">
        <fePointLight x="-50" y="-100" z="200"/>
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>

    <filter id="sunGlow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sunGlowStrong"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

    <mask id="screenMask">
      <rect width="300" height="300" fill="white" />
      <path d="M122.19,136.72c-3.46-6.12-1.68-13.4,0-20.23,3.4-13.86,12.37-22.19,15.27-24.81,12.96-11.72,28.03-13.44,37.4-14.5,7.61-.87,29.07-3,50,9.92,11.24,6.94,17.6,15.3,20.99,19.85,4.95,6.64,11.38,15.49,12.21,27.86.31,4.66.63,9.47-2.29,13.74-1.18,1.73-5.28,6.86-23.66,8.02-11.13.7-18.88-.6-30.15-2.29-21.22-3.18-7.48-.64-35.88-4.96-34.6-5.27-40.66-6.87-43.89-12.6Z" fill="black" />
    </mask>

    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff700"/><stop offset="70%" stop-color="#ff8800"/><stop offset="100%" stop-color="#ff4400"/>
    </radialGradient>

    <radialGradient id="bodyGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f48bc4"/><stop offset="60%" stop-color="#d6509d"/><stop offset="100%" stop-color="#8b2d61"/>
    </radialGradient>
    
    <radialGradient id="btnGrad" cx="40%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#e8e880"/><stop offset="100%" stop-color="#909000"/>
    </radialGradient>
  </defs>

  <g id="rhythm-sun-container">
     <circle id="rhythm-sun" cx="190" cy="115" r="38" fill="url(#sunGrad)" filter="url(#sunGlow)" />
  </g>

  <g mask="url(#screenMask)">
    <path id="main_frame" filter="url(#metal3d)"
      d="M103.01,218.59c-26.84,2.6-45.87,8.38-62.25-3.34-16.75-11.98-18.98-33.85-19.33-39.75-.97-16.29,4.94-36.59,20.49-47.92,16.31-11.89,28.03-2.84,48.72-13.74,21.04-11.1,17.95-25.23,35.18-39.38,25.96-21.3,75.13-23.84,110.58-1.49,5.77,3.64,37.32,24.42,41.76,62.04,4.52,38.31-21.27,75.49-52.2,89.16-35.72,15.78-49.02-12.74-122.95-5.57Z"
      fill="url(#bodyGrad)" stroke="#4a0028" stroke-width="1.5"
    />
    <path id="screen_edge" filter="url(#metal3d)"
      d="M117.82,143.97c-2.21-6.71-6.69-23.68,1.27-40.99,15.61-33.96,63.33-34.94,66.77-34.96,28.68-.18,58.84,14.6,72.69,40.99,3.75,7.15,13.89,26.48,6.34,39.38-12.79,21.86-72.31,18.42-147.06-4.42Z"
      fill="#8B0000" stroke="#4a0000" stroke-width="2"
    />
  </g>

  <path id="play_x2F_stop_button" class="btn-shape" fill="url(#btnGrad)" stroke="#6b7a00" d="M67.28,172.46c-2.36-5.35,3.69-11.89,10.68-12.17,6.43-.26,12.34,4.84,13.19,9.43.63,3.4-1.15,8.49-6.91,9.82-6.45,1.48-14.91-2.43-16.96-7.07Z"/>
  <text x="73" y="174" class="text-label" font-size="6">▷||</text>

  <path id="next_song_button" class="btn-shape" fill="url(#btnGrad)" stroke="#6b7a00" d="M79.26,155.43c-6.53-.35-11.93-11.85-10.15-18.4,2.37-8.71,17.38-9.57,20.08-2.11,2.28,6.3-2.49,20.92-9.93,20.51Z"/>
  <text x="76" y="143" class="text-label" font-size="6" transform="rotate(-15, 76, 143)">≫</text>

  <path id="rewind_button" class="btn-shape" fill="url(#btnGrad)" stroke="#6b7a00" d="M63.47,171.1c.09-3.76-10.41-10.53-19.42-7.09-7.37,2.82-9.75,10.94-6.83,13.73,4.64,4.44,26.12-1.32,26.25-6.65Z"/>
  <text x="44" y="174" class="text-label" font-size="6">≪</text>

  <path id="fast_forward_button" class="btn-shape" fill="url(#btnGrad)" stroke="#6b7a00" d="M94.07,170.28c-1.38-4.73,10.64-11.58,18.87-9.67,7.75,1.8,10.51,11,4.97,14.35-6.14,3.71-22.4.25-23.84-4.68Z"/>
  <text x="100" y="173" class="text-label" font-size="6">≫</text>

  <path id="close_button" class="btn-shape" fill="url(#btnGrad)" stroke="#6b7a00" d="M76.63,185.19c-4.97,3.72-7.28,17.9-5.22,24.13,3.1,9.38,17.22,3.94,18.27-5.22.88-7.58-6.49-23.82-13.05-18.91Z"/>
  <text x="80" y="202" class="text-label" font-size="6">■</text>

  <g id="rainbow-vol" transform="translate(180, 215)">
    <path d="M0,30 A30,30 0 0,1 60,30" fill="none" stroke="red" stroke-width="3" />
    <path d="M4,30 A26,26 0 0,1 56,30" fill="none" stroke="orange" stroke-width="3" />
    <path d="M8,30 A22,22 0 0,1 52,30" fill="none" stroke="yellow" stroke-width="3" />
    <path d="M12,30 A18,18 0 0,1 48,30" fill="none" stroke="green" stroke-width="3" />
    <circle id="vol-knob" cx="30" cy="5" r="4" fill="#fff" stroke="#999" class="btn-shape" />
  </g>

  <text x="210" y="195" text-anchor="middle" font-family="monospace" font-size="6" fill="#ffccff" id="track-name">♪ READY</text>
  <line x1="160" y1="202" x2="260" y2="202" stroke="#4a0028" stroke-width="3" stroke-linecap="round"/>
  <line id="seeker-fill" x1="160" y1="202" x2="160" y2="202" stroke="#ff80c0" stroke-width="3" stroke-linecap="round"/>
  <circle id="seeker-knob" cx="160" cy="202" r="3" fill="#fff" class="btn-shape" />

</svg>
</div>

<script>
const state = {
  playing: false,
  progress: 0,
  track: 'Rhythm of the Sun',
  duration: 240,
  currentTime: 0
};

const widget = document.getElementById('player-widget');
const playBtn = document.getElementById('play_x2F_stop_button');
const seekerFill = document.getElementById('seeker-fill');
const seekerKnob = document.getElementById('seeker-knob');
const trackName = document.getElementById('track-name');

function updateUI() {
  if (state.playing) {
    widget.classList.add('playing');
    trackName.textContent = '♪ ' + state.track;
  } else {
    widget.classList.remove('playing');
    trackName.textContent = '♪ PAUSED';
  }
  
  const startX = 160, endX = 260;
  const currentX = startX + state.progress * (endX - startX);
  seekerFill.setAttribute('x2', currentX);
  seekerKnob.setAttribute('cx', currentX);
}

let timer;
playBtn.addEventListener('click', () => {
  state.playing = !state.playing;
  if (state.playing) {
    timer = setInterval(() => {
      state.currentTime = (state.currentTime + 1) % state.duration;
      state.progress = state.currentTime / state.duration;
      updateUI();
    }, 1000);
  } else {
    clearInterval(timer);
  }
  updateUI();
});

// Basic Dragging Logic
let isDragging = false;
let startX, startY, offLeft, offTop;

widget.addEventListener('mousedown', (e) => {
  if (e.target.closest('.btn-shape')) return;
  isDragging = true;
  const rect = widget.getBoundingClientRect();
  offLeft = e.clientX - rect.left;
  offTop = e.clientY - rect.top;
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  widget.style.left = (e.clientX - offLeft) + 'px';
  widget.style.top = (e.clientY - offTop) + 'px';
  widget.style.bottom = 'auto';
  widget.style.right = 'auto';
});

document.addEventListener('mouseup', () => isDragging = false);

updateUI();
</script>
</body>
</html>
