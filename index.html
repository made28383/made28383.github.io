<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Y2K MP3 Player</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100vw;
  height:100vh;
  overflow:hidden;

  background:
  radial-gradient(circle at 75% 20%, #fff6aa 0%, #ffe96a 8%, transparent 15%),
  linear-gradient(to bottom,#8ee6ff 0%,#b9f4ff 45%,#ffd7ef 100%);
}

/* PLAYER */

#player{
  position:absolute;
  width:620px;

  left:70px;
  top:60px;

  cursor:grab;
  user-select:none;

  filter:
  drop-shadow(0 18px 25px rgba(88,0,55,.45))
  drop-shadow(0 4px 10px rgba(255,120,220,.35));

  z-index:999;
}

#player:active{
  cursor:grabbing;
}

svg{
  width:100%;
  height:auto;
  overflow:visible;
}

/* BUTTONS */

.button{
  cursor:pointer;
  transition:
  transform .08s,
  filter .15s;
}

.button:hover{
  filter:brightness(1.08);
}

.button:active{
  transform:translateY(2px) scale(.93);
  transform-origin:center;
}

.info{
  font-family:"Courier New", monospace;
}

</style>
</head>

<body>

<div id="player">

  <stop offset="28%" stop-color="#e771ba"/>
  <stop offset="70%" stop-color="#c65ba3"/>

  <stop offset="100%" stop-color="#8f1c56"/>

  <stop offset="100%" stop-color="#7a700f"/>

  <stop offset="40%" stop-color="#bcbcbc"/>
  <stop offset="100%" stop-color="#2c2c2c"/>

<!-- CLOUD -->

  <stop offset="100%" stop-color="#d8ffff"/>

</div>

<audio id="audio"></audio>

<script>

/* AUDIO */

const audio = document.getElementById("audio");

const playBtn = document.getElementById("playBtn");
const stopBtn = document.getElementById("stopBtn");
const ffBtn = document.getElementById("ffBtn");
const rewBtn = document.getElementById("rewBtn");
const loadBtn = document.getElementById("loadBtn");

const progress = document.getElementById("progress");
const knob = document.getElementById("knob");

const title = document.getElementById("title");
const artist = document.getElementById("artist");
const time = document.getElementById("time");

let playing = false;

/* LOAD SONG */

loadBtn.addEventListener("click",()=>{

  const input = document.createElement("input");

  input.type = "file";
  input.accept = "audio/*";

  input.onchange = e=>{

    const file = e.target.files[0];

    if(!file) return;

    audio.src = URL.createObjectURL(file);

    const clean = file.name.replace(/\.[^/.]+$/,"");

    const split = clean.split("-");

    if(split.length > 1){

      artist.textContent = split[0].trim().toUpperCase();
      title.textContent = split[1].trim().toUpperCase();

    }else{

      title.textContent = clean.toUpperCase();
      artist.textContent = "UNKNOWN ARTIST";

    }

    audio.play();
    playing = true;

  };

  input.click();

});

/* PLAY */

playBtn.addEventListener("click",()=>{

  if(!audio.src) return;

  if(playing){

    audio.pause();
    playing = false;

  }else{

    audio.play();
    playing = true;

  }

});

/* STOP */

stopBtn.addEventListener("click",()=>{

  audio.pause();
  audio.currentTime = 0;

  playing = false;

});

/* SEEK */

ffBtn.addEventListener("click",()=>{

  audio.currentTime += 5;

});

rewBtn.addEventListener("click",()=>{

  audio.currentTime -= 5;

});

/* UPDATE */

audio.addEventListener("timeupdate",()=>{

  const current = audio.currentTime;
  const duration = audio.duration || 0;

  const percent = current / duration;

  progress.setAttribute("width",percent * 220);

  knob.setAttribute("cx",285 + percent * 220);

  time.textContent =
  format(current) + " / " + format(duration);

});

function format(t){

  if(!t || isNaN(t)) return "0:00";

  const m = Math.floor(t/60);
  const s = Math.floor(t%60);

  return m + ":" + String(s).padStart(2,"0");

}

/* DRAG */

const player = document.getElementById("player");

let drag = false;

let offsetX = 0;
let offsetY = 0;

player.addEventListener("mousedown",(e)=>{

  if(e.target.closest(".button")) return;

  drag = true;

  offsetX = e.clientX - player.offsetLeft;
  offsetY = e.clientY - player.offsetTop;

});

document.addEventListener("mousemove",(e)=>{

  if(!drag) return;

  player.style.left = (e.clientX - offsetX) + "px";
  player.style.top = (e.clientY - offsetY) + "px";

});

document.addEventListener("mouseup",()=>{

  drag = false;

});

</script>
