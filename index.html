  cursor:pointer;
  transition:transform .12s ease, filter .12s ease;

.btn:hover{

}

.btn:active{

<script>

const player = document.getElementById('player');

let dragging = false;
let offsetX = 0;
let offsetY = 0;

player.addEventListener('mousedown', (e)=>{

  if(e.target.closest('.btn')) return;

  dragging = true;
  player.classList.add('dragging');

  offsetX = e.clientX - player.offsetLeft;
  offsetY = e.clientY - player.offsetTop;

});

window.addEventListener('mousemove', (e)=>{

  if(!dragging) return;

  player.style.left = (e.clientX - offsetX) + 'px';
  player.style.top = (e.clientY - offsetY) + 'px';

});

window.addEventListener('mouseup', ()=>{
  dragging = false;
  player.classList.remove('dragging');
});


const sunRays = document.getElementById('sunRays');
let rotation = 0;

function animateSun(){

  rotation += 0.08;

  sunRays.setAttribute(
    'transform',
    `translate(585 195) rotate(${rotation})`
  );

  requestAnimationFrame(animateSun);
}

animateSun();


const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
const progressFill = document.getElementById('progressFill');
const progressKnob = document.getElementById('progressKnob');
const currentTimeText = document.getElementById('currentTime');
const durationText = document.getElementById('duration');

let isPlaying = false;

// ADD YOUR SONG HERE
// audio.src = 'song.mp3';

playBtn.addEventListener('click', ()=>{

  if(!audio.src){
    alert('Add your mp3 file in code first');
    return;
  }

  if(isPlaying){
    audio.pause();

    playIcon.style.display = 'block';
    pauseIcon.style.display = 'none';

  }else{
    audio.play();

    playIcon.style.display = 'none';
    pauseIcon.style.display = 'block';
  }

  isPlaying = !isPlaying;

});


audio.addEventListener('timeupdate', ()=>{

  if(!audio.duration) return;

  const progress = audio.currentTime / audio.duration;

  const width = 420 * progress;

  progressFill.setAttribute('width', width);
  progressKnob.setAttribute('cx', 190 + width);

  currentTimeText.textContent = formatTime(audio.currentTime);
  durationText.textContent = '-' + formatTime(audio.duration - audio.currentTime);

});


function formatTime(seconds){

  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);

  return mins + ':' + String(secs).padStart(2,'0');
}


document.getElementById('backBtn').addEventListener('click', ()=>{
  audio.currentTime -= 10;
});


document.getElementById('nextBtn').addEventListener('click', ()=>{
  audio.currentTime += 10;
});


document.getElementById('stopBtn').addEventListener('click', ()=>{

  audio.pause();
  audio.currentTime = 0;

  isPlaying = false;

  playIcon.style.display = 'block';
  pauseIcon.style.display = 'none';

});


const volumeKnob = document.getElementById('volumeKnob');

let volumeDragging = false;

volumeKnob.addEventListener('mousedown', ()=>{
  volumeDragging = true;
});

window.addEventListener('mouseup', ()=>{
  volumeDragging = false;
});

window.addEventListener('mousemove', (e)=>{

  if(!volumeDragging) return;

  const rect = player.getBoundingClientRect();

  let x = e.clientX - rect.left;

  x = Math.max(220, Math.min(370, x));

  const percent = (x - 220) / 150;

  audio.volume = percent;

  const angle = -55 + percent * 110;

  const radians = angle * Math.PI / 180;

  const radius = 90;

  const cx = 295 + Math.cos(radians) * radius;
  const cy = 510 + Math.sin(radians) * radius;

  volumeKnob.setAttribute('cx', cx);
  volumeKnob.setAttribute('cy', cy);

});

</script>

</body>
