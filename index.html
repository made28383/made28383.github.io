<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daffodil Click Effect</title>
    <style>
        body {
            background-color: darkred;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            cursor: pointer;
        }

        .flower {
            position: relative;
            width: 60px;
            height: 60px;
            background-color: white;
            border-radius: 10% 10% 0 0; /* Petal shape */
            transform: rotate(45deg);
            margin: 15px;
            transition: transform 0.3s ease;
        }

        .flower::before, .flower::after {
            content: '';
            position: absolute;
            background-color: white;
            border-radius: 10% 10% 0 0; /* Petal shape */
            transition: transform 0.3s ease;
        }

        .flower::before {
            width: 60px;
            height: 60px;
            top: -30px;
            left: 0;
        }

        .flower::after {
            width: 60px;
            height: 60px;
            left: 30px;
            top: 0;
        }

        .flower:hover {
            transform: scale(1.2);
        }

        .flower:hover::before, .flower:hover::after {
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <script>
        const flowerContainer = document.body;

        function addFlower() {
            const flower = document.createElement('div');
            flower.classList.add('flower');
            flowerContainer.appendChild(flower);
        }

        // Add a flower on click
        flowerContainer.addEventListener('click', addFlower);
    </script>
</body>
</html>
