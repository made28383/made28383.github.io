<!DOCTYPE html>

  margin:0;

  box-sizing:border-box;

body{
  width:100vw;
  height:100vh;
  overflow:hidden;

  background:
  radial-gradient(circle at 75% 15%, #fff6a3 0%, #ffe870 8%, transparent 14%),
  linear-gradient(180deg,#8ce7ff 0%,#c8f7ff 45%,#ffd9f0 100%);

}

#player{
  position:absolute;
  width:640px;
  left:60px;
  top:40px;
  user-select:none;
  cursor:grab;

  filter:
  drop-shadow(0 22px 30px rgba(80,0,50,.45))
  drop-shadow(0 0 18px rgba(255,120,220,.35));
}

#player:active{
  cursor:grabbing;
}

svg{
  width:100%;
  overflow:visible;
}

.button{
  cursor:pointer;
  transition:transform .08s, filter .12s;
  transform-origin:center;
}

.button:hover{
  filter:brightness(1.08);
}

.button:active{
  transform:translateY(2px) scale(.94);
}

.info{
  font-family:"Courier New",monospace;
}

</style>

<audio id="audio"></audio>

<script>

const player = document.getElementById('player');
const audio = document.getElementById('audio');

const playBtn = document.getElementById('playBtn');
const stopBtn = document.getElementById('stopBtn');
const ffBtn = document.getElementById('ffBtn');
const rewBtn = document.getElementById('rewBtn');
const loadBtn = document.getElementById('loadBtn');

const progress = document.getElementById('progress');
const knob = document.getElementById('knob');

const title = document.getElementById('songTitle');
const artist = document.getElementById('songArtist');
const time = document.getElementById('time');
const playText = document.getElementById('playText');

let playing = false;

/* LOAD */

loadBtn.addEventListener('click',()=>{

  const input = document.createElement('input');

  input.type='file';
  input.accept='audio/*';

  input.onchange=e=>{

    const file=e.target.files[0];
    if(!file) return;

    audio.src=URL.createObjectURL(file);

    const clean=file.name.replace(/\.[^/.]+$/,'');
    const split=clean.split('-');

    if(split.length>1){
      artist.textContent=split[0].trim().toUpperCase();
      title.textContent=split[1].trim().toUpperCase();
    }else{
      title.textContent=clean.toUpperCase();
      artist.textContent='UNKNOWN ARTIST';
    }

    audio.play();
    playing=true;
    playText.textContent='❚❚';

  }

  input.click();

});

/* PLAY */

playBtn.addEventListener('click',()=>{

  if(!audio.src) return;

  if(playing){
    audio.pause();
    playing=false;
    playText.textContent='▶';
  }else{
    audio.play();
    playing=true;
    playText.textContent='❚❚';
  }

});

/* STOP */

stopBtn.addEventListener('click',()=>{

  audio.pause();
  audio.currentTime=0;
  playing=false;
  playText.textContent='▶';

});

/* SEEK */

ffBtn.addEventListener('click',()=>{
  audio.currentTime += 5;
});

rewBtn.addEventListener('click',()=>{
  audio.currentTime -= 5;
});

/* UPDATE */

audio.addEventListener('timeupdate',()=>{

  const current=audio.currentTime;
  const duration=audio.duration || 0;

  const percent=current/duration;

  progress.setAttribute('width', percent*240);
  knob.setAttribute('cx', 300 + percent*240);

  time.textContent=format(current)+' / '+format(duration);

});

function format(t){

  if(!t || isNaN(t)) return '0:00';

  const m=Math.floor(t/60);
  const s=Math.floor(t%60);

  return m+':'+String(s).padStart(2,'0');

}

/* DRAG */

let drag=false;
let offsetX=0;
let offsetY=0;

player.addEventListener('mousedown',e=>{

  if(e.target.closest('.button')) return;

  drag=true;

  offsetX=e.clientX-player.offsetLeft;
  offsetY=e.clientY-player.offsetTop;

});

window.addEventListener('mousemove',e=>{

  if(!drag) return;

  player.style.left=(e.clientX-offsetX)+'px';
  player.style.top=(e.clientY-offsetY)+'px';

});

window.addEventListener('mouseup',()=>{
  drag=false;
});

</script>

</body>
</html>
