<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interactive Flower Garden</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        overflow: hidden;
        background: radial-gradient(circle at center, #4a0000 0%, #1a0000 100%);
        height: 100vh;
        cursor: crosshair;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    .info {
        position: absolute;
        top: 20px;
        left: 20px;
        color: rgba(255,255,255,0.7);
        font-size: 14px;
        letter-spacing: 1px;
        pointer-events: none;
    }
</style>
</head>
<body>

<div class="info">
    Move your mouse to grow flowers
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

const mouse = {
    x: width / 2,
    y: height / 2
};

window.addEventListener("resize", () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    createFlowers();
});

window.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

class Flower {
    constructor(x, y, size) {
        this.x = x;
        this.y = y;
        this.baseSize = size;
        this.size = size;
        this.maxSize = size * 3;
        this.petals = 6 + Math.floor(Math.random() * 5);
        this.rotation = Math.random() * Math.PI * 2;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);

        // Petals
        for (let i = 0; i < this.petals; i++) {
            ctx.rotate((Math.PI * 2) / this.petals);

            ctx.beginPath();
            ctx.ellipse(
                0,
                this.size * 0.8,
                this.size * 0.35,
                this.size,
                0,
                0,
                Math.PI * 2
            );

            ctx.fillStyle = "rgba(255,255,255,0.95)";
            ctx.shadowColor = "rgba(255,255,255,0.8)";
            ctx.shadowBlur = 15;
            ctx.fill();
        }

        // Center
        ctx.beginPath();
        ctx.arc(0, 0, this.size * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = "#ffe8a3";
        ctx.shadowBlur = 10;
        ctx.fill();

        ctx.restore();
    }

    update() {
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        const influenceRadius = 150;

        if (distance < influenceRadius) {
            const growth = 1 + (1 - distance / influenceRadius) * 2;
            this.size += (this.baseSize * growth - this.size) * 0.08;
        } else {
            this.size += (this.baseSize - this.size) * 0.05;
        }

        this.draw();
    }
}

let flowers = [];

function createFlowers() {
    flowers = [];

    const spacing = 120;

    for (let y = 80; y < height; y += spacing) {
        for (let x = 80; x < width; x += spacing) {

            const offsetX = (Math.random() - 0.5) * 40;
            const offsetY = (Math.random() - 0.5) * 40;

            flowers.push(
                new Flower(
                    x + offsetX,
                    y + offsetY,
                    12 + Math.random() * 10
                )
            );
        }
    }
}

function drawBackgroundGlow() {
    const gradient = ctx.createRadialGradient(
        mouse.x,
        mouse.y,
        10,
        mouse.x,
        mouse.y,
        250
    );

    gradient.addColorStop(0, "rgba(255,120,120,0.12)");
    gradient.addColorStop(1, "rgba(255,0,0,0)");

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, width, height);
}

function animate() {
    ctx.clearRect(0, 0, width, height);

    drawBackgroundGlow();

    flowers.forEach(flower => flower.update());

    requestAnimationFrame(animate);
}

createFlowers();
animate();
</script>

</body>
</html>
