<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realistic 3D MP3 Widget</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: #1a1a1a url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  #player-widget {
    position: fixed;
    bottom: 50px;
    right: 50px;
    width: 450px;
    height: 450px;
    cursor: grab;
    user-select: none;
    z-index: 1000;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
  }
  #player-widget:active { cursor: grabbing; }

  .btn-shape { cursor: pointer; transition: transform 0.1s; }
  .btn-shape:active { transform: scale(0.95); }

  /* Sun animation linked to "playing" state */
  @keyframes sunPulse {
    0%, 100% { transform: scale(1); filter: saturate(1) brightness(1); }
    50% { transform: scale(1.05); filter: saturate(1.3) brightness(1.2); }
  }
  .playing #sun-core { animation: sunPulse 0.6s infinite ease-in-out; transform-origin: center; }
  .playing #sun-rays { animation: sunPulse 0.6s infinite ease-in-out reverse; transform-origin: center; }

  .text-lcd {
    font-family: 'Courier New', monospace;
    font-weight: bold;
    fill: #00ff00;
    text-shadow: 0 0 5px rgba(0,255,0,0.5);
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="player-widget">
<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" id="main-svg">
  <defs>
    <filter id="realistic3d" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1" specularExponent="20" lighting-color="#ffffff" result="specOut">
        <fePointLight x="-50" y="-100" z="200"/>
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>

    <radialGradient id="bodyGrad" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#f48bc4"/><stop offset="100%" stop-color="#8b2d61"/>
    </radialGradient>
    <radialGradient id="btnGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fff799"/><stop offset="100%" stop-color="#b5a500"/>
    </radialGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff700"/><stop offset="100%" stop-color="#ff6600"/>
    </radialGradient>

    <clipPath id="screenClip">
      <path d="M122.19,136.72c-3.46-6.12-1.68-13.4,0-20.23,3.4-13.86,12.37-22.19,15.27-24.81,12.96-11.72,28.03-13.44,37.4-14.5,7.61-.87,29.07-3,50,9.92,11.24,6.94,17.6,15.3,20.99,19.85,4.95,6.64,11.38,15.49,12.21,27.86.31,4.66.63,9.47-2.29,13.74-1.18,1.73-5.28,6.86-23.66,8.02-11.13.7-18.88-.6-30.15-2.29-21.22-3.18-7.48-.64-35.88-4.96-34.6-5.27-40.66-6.87-43.89-12.6Z" />
    </clipPath>
  </defs>

  <path d="M103.01,218.59c-26.84,2.6-45.87,8.38-62.25-3.34-16.75-11.98-18.98-33.85-19.33-39.75-.97-16.29,4.94-36.59,20.49-47.92,16.31-11.89,28.03-2.84,48.72-13.74,21.04-11.1,17.95-25.23,35.18-39.38,25.96-21.3,75.13-23.84,110.58-1.49,5.77,3.64,37.32,24.42,41.76,62.04,4.52,38.31-21.27,75.49-52.2,89.16-35.72,15.78-49.02-12.74-122.95-5.57Z" 
        fill="url(#bodyGrad)" stroke="#4a0d2e" stroke-width="2" filter="url(#realistic3d)" />

  <g clip-path="url(#screenClip)">
    <rect x="0" y="0" width="300" height="300" fill="rgba(0,0,0,0.85)" />
    
    <g id="sun-container" transform="translate(195, 105)">
      <path id="sun-rays" d="M-30,-5 Q-40,-20 -20,-30 Q-5,-40 10,-35 Q25,-30 35,-10 Q40,10 30,25 Q15,40 -5,35 Q-25,30 -35,10 Z" fill="#ffcc00" opacity="0.6" />
      <circle id="sun-core" r="22" fill="url(#sunGrad)" />
    </g>

    <text x="140" y="115" class="text-lcd" font-size="8">♪ SUNSHINE.MP3</text>
    <text x="140" y="125" class="text-lcd" font-size="6" id="time-display">00:00 / 03:45</text>
  </g>

  <path d="M117.82,143.97c-2.21-6.71-6.69-23.68,1.27-40.99,15.61-33.96,63.33-34.94,66.77-34.96,28.68-.18,58.84,14.6,72.69,40.99,3.75,7.15,13.89,26.48,6.34,39.38-12.79,21.86-72.31,18.42-147.06-4.42Z" 
        fill="none" stroke="#d63384" stroke-width="3" filter="url(#realistic3d)" />

  <g id="controls" filter="url(#realistic3d)">
    <path id="play_btn" class="btn-shape" d="M67.28,172.46c-2.36-5.35,3.69-11.89,10.68-12.17,6.43-.26,12.34,4.84,13.19,9.43.63,3.4-1.15,8.49-6.91,9.82-6.45,1.48-14.91-2.43-16.96-7.07Z" fill="url(#btnGrad)"/>
    <path id="next_btn" class="btn-shape" d="M79.26,155.43c-6.53-.35-11.93-11.85-10.15-18.4,2.37-8.71,17.38-9.57,20.08-2.11,2.28,6.3-2.49,20.92-9.93,20.51Z" fill="url(#btnGrad)"/>
    <path id="rew_btn" class="btn-shape" d="M63.47,171.1c.09-3.76-10.41-10.53-19.42-7.09-7.37,2.82-9.75,10.94-6.83,13.73,4.64,4.44,26.12-1.32,26.25-6.65Z" fill="url(#btnGrad)"/>
    <path id="stop_btn" class="btn-shape" d="M76.63,185.19c-4.97,3.72-7.28,17.9-5.22,24.13,3.1,9.38,17.22,3.94,18.27-5.22.88-7.58-6.49-23.82-13.05-18.91Z" fill="url(#btnGrad)"/>
  </g>

  <g id="volume-group" transform="translate(170, 160)">
    <path d="M0,20 A20,20 0 0,1 40,20" fill="none" stroke="red" stroke-width="2" />
    <path d="M2,20 A18,18 0 0,1 38,20" fill="none" stroke="orange" stroke-width="2" />
    <path d="M4,20 A16,16 0 0,1 36,20" fill="none" stroke="yellow" stroke-width="2" />
    <path d="M6,20 A14,14 0 0,1 34,20" fill="none" stroke="green" stroke-width="2" />
    <circle id="vol-knob" cx="20" cy="5" r="4" fill="#fff" filter="url(#realistic3d)" class="btn-shape" />
  </g>

  <line x1="135" y1="145" x2="245" y2="145" stroke="#4a0d2e" stroke-width="3" stroke-linecap="round" />
  <polygon id="seeker-star" points="5,0 2,10 10,4 0,4 8,10" fill="#ffcc00" transform="translate(160, 140) scale(0.8)" filter="url(#realistic3d)" class="btn-shape" />

</svg>
</div>

<script>
  const widget = document.getElementById('player-widget');
  const playBtn = document.getElementById('play_btn');
  let isPlaying = false;
  let drag = { active: false, x: 0, y: 0 };

  // Draggable logic
  widget.onmousedown = (e) => {
    if(e.target.closest('.btn-shape')) return;
    drag.active = true;
    drag.x = e.clientX - widget.offsetLeft;
    drag.y = e.clientY - widget.offsetTop;
  };

  document.onmousemove = (e) => {
    if (!drag.active) return;
    widget.style.left = (e.clientX - drag.x) + 'px';
    widget.style.top = (e.clientY - drag.y) + 'px';
    widget.style.bottom = 'auto'; widget.style.right = 'auto';
  };

  document.onmouseup = () => drag.active = false;

  // Play functionality
  playBtn.onclick = () => {
    isPlaying = !isPlaying;
    widget.classList.toggle('playing', isPlaying);
  };
</script>
</body>
</html>
