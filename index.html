<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lillede Mäng</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:
        radial-gradient(circle at top,
        #5c0000 0%,
        #220000 45%,
        #090000 100%);
}

canvas{
    display:block;
}

.ui{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    z-index:10;
}

.score{
    font-size:28px;
    font-weight:bold;
}

.combo{
    margin-top:6px;
    color:#ffcaca;
}

.timer{
    position:absolute;
    top:20px;
    right:20px;
    color:white;
    font-size:28px;
    font-weight:bold;
}

.info{
    position:absolute;
    bottom:20px;
    left:20px;
    color:rgba(255,255,255,0.6);
}

.gameover{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.gameover.show{
    opacity:1;
    pointer-events:auto;
}

button{
    margin-top:20px;
    padding:14px 24px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>
<body>

<div class="ui">
    <div class="score">
        Punktid: <span id="score">0</span>
    </div>

    <div class="combo">
        Combo: <span id="combo">x1</span>
    </div>
</div>

<div class="timer" id="timer">
    60
</div>

<div class="info">
    Korja hiirega lilli ✿
</div>

<div class="gameover" id="gameover">

    <h1>Mäng Läbi</h1>

    <h2>
        Skoor:
        <span id="finalScore">0</span>
    </h2>

    <button onclick="restartGame()">
        Uuesti
    </button>

</div>

<canvas id="canvas"></canvas>

<script>
const canvas =
    document.getElementById("canvas");

const ctx =
    canvas.getContext("2d");

const scoreEl =
    document.getElementById("score");

const comboEl =
    document.getElementById("combo");

const timerEl =
    document.getElementById("timer");

const gameoverEl =
    document.getElementById("gameover");

const finalScoreEl =
    document.getElementById("finalScore");

let w,h,dpr;

function resize(){

    dpr =
        window.devicePixelRatio || 1;

    w = window.innerWidth;
    h = window.innerHeight;

    canvas.width = w * dpr;
    canvas.height = h * dpr;

    canvas.style.width = w + "px";
    canvas.style.height = h + "px";

    ctx.setTransform(dpr,0,0,dpr,0,0);
}

resize();

window.addEventListener(
    "resize",
    resize
);

const mouse = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2
};

window.addEventListener(
    "mousemove",
    e => {

        mouse.x = e.clientX;
        mouse.y = e.clientY;
    }
);

let score = 0;
let combo = 1;
let gameTime = 60;
let gameEnded = false;

class Flower{

    constructor(){

        this.reset();
    }

    reset(){

        this.x =
            Math.random() * w;

        this.y =
            Math.random() * h;

        this.baseSize =
            14 + Math.random() * 18;

        this.size =
            this.baseSize;

        this.petals =
            6 + Math.floor(Math.random()*4);

        this.rotation =
            Math.random() * Math.PI * 2;

        this.floatOffset =
            Math.random() * 1000;
    }

    drawPetal(angle){

        ctx.save();

        ctx.rotate(angle);

        ctx.beginPath();

        ctx.moveTo(0,0);

        ctx.bezierCurveTo(
            this.size * 0.25,
            -this.size * 0.2,

            this.size * 0.8,
            this.size * 0.5,

            0,
            this.size * 1.6
        );

        ctx.bezierCurveTo(
            -this.size * 0.8,
            this.size * 0.5,

            -this.size * 0.25,
            -this.size * 0.2,

            0,
            0
        );

        ctx.fillStyle =
            "rgba(255,255,255,0.96)";

        ctx.shadowColor =
            "rgba(255,255,255,0.4)";

        ctx.shadowBlur = 8;

        ctx.fill();

        ctx.restore();
    }

    draw(time){

        const floatY =
            Math.sin(
                time * 0.001 +
                this.floatOffset
            ) * 4;

        ctx.save();

        ctx.translate(
            this.x,
            this.y + floatY
        );

        ctx.rotate(
            this.rotation +
            time * 0.0002
        );

        for(let i=0;i<this.petals;i++){

            this.drawPetal(
                (Math.PI*2/this.petals)*i
            );
        }

        ctx.beginPath();

        ctx.arc(
            0,
            0,
            this.size * 0.28,
            0,
            Math.PI * 2
        );

        ctx.fillStyle = "#ffd966";

        ctx.fill();

        ctx.restore();
    }

    update(time){

        if(gameEnded) return;

        const dx =
            mouse.x - this.x;

        const dy =
            mouse.y - this.y;

        const distSq =
            dx*dx + dy*dy;

        let target =
            this.baseSize;

        if(distSq < 170*170){

            target =
                this.baseSize * 1.8;
        }

        this.size +=
            (target - this.size) * 0.35;

        if(distSq < this.size*this.size){

            this.collect();
        }

        this.draw(time);
    }

    collect(){

        score += 10 * combo;

        combo++;

        scoreEl.textContent = score;
        comboEl.textContent = "x" + combo;

        this.reset();
    }
}

const flowers = [];

function createFlowers(){

    flowers.length = 0;

    for(let i=0;i<25;i++){

        flowers.push(
            new Flower()
        );
    }
}

function backgroundGlow(){

    const gradient =
        ctx.createRadialGradient(
            mouse.x,
            mouse.y,
            0,
            mouse.x,
            mouse.y,
            220
        );

    gradient.addColorStop(
        0,
        "rgba(255,80,80,0.12)"
    );

    gradient.addColorStop(
        1,
        "rgba(255,0,0,0)"
    );

    ctx.fillStyle = gradient;

    ctx.fillRect(0,0,w,h);
}

function animate(time){

    ctx.fillStyle =
        "rgba(10,0,0,0.18)";

    ctx.fillRect(0,0,w,h);

    backgroundGlow();

    flowers.forEach(flower => {
        flower.update(time);
    });

    requestAnimationFrame(animate);
}

function startTimer(){

    const interval =
        setInterval(() => {

        if(gameEnded){

            clearInterval(interval);
            return;
        }

        gameTime--;

        timerEl.textContent =
            gameTime;

        if(gameTime <= 0){

            gameEnded = true;

            finalScoreEl.textContent =
                score;

            gameoverEl.classList.add(
                "show"
            );

            clearInterval(interval);
        }

    },1000);
}

function restartGame(){

    score = 0;
    combo = 1;
    gameTime = 60;
    gameEnded = false;

    scoreEl.textContent = 0;
    comboEl.textContent = "x1";
    timerEl.textContent = 60;

    gameoverEl.classList.remove(
        "show"
    );

    createFlowers();

    startTimer();
}

createFlowers();
startTimer();
animate();
</script>

</body>
</html>
