<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Y2K Cloud MP3 Player</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  overflow:hidden;

  background:
  radial-gradient(circle at 70% 20%, #fff6a8 0%, #ffe66d 12%, transparent 18%),
  linear-gradient(180deg,#8fe3ff 0%,#b8f2ff 40%,#ffd6f2 100%);

  font-family:Arial,sans-serif;
}

/* FLOATING PLAYER */
#player-widget{
  position:fixed;
  width:520px;
  top:80px;
  left:80px;
  z-index:9999;
  cursor:grab;
  user-select:none;

  filter:
    drop-shadow(0 0 28px rgba(255,120,220,0.45))
    drop-shadow(0 18px 35px rgba(120,0,80,0.35));

  transition:transform .15s;
}

#player-widget:active{
  cursor:grabbing;
}

svg{
  width:100%;
  overflow:visible;
}

/* BUTTONS */

.btn{
  cursor:pointer;
  transition:
    transform .08s,
    filter .15s;
  transform-origin:center;
}

.btn:hover{
  filter:brightness(1.12);
}

.btn:active{
  transform:scale(.92);
}

/* TEXT */

.info{
  font-family:"Courier New",monospace;
  letter-spacing:.5px;
}
</style>
</head>

<body>

<div id="player-widget">

<svg viewBox="0 0 420 300">

<defs>

<!-- MAIN PINK BODY -->
<radialGradient id="gBody" cx="35%" cy="25%" r="80%">
  <stop offset="0%" stop-color="#ffd8f3" stop-opacity="0.95"/>
  <stop offset="25%" stop-color="#ff9fe0" stop-opacity="0.92"/>
  <stop offset="55%" stop-color="#ff74cb" stop-opacity="0.88"/>
  <stop offset="82%" stop-color="#ea4cae" stop-opacity="0.92"/>
  <stop offset="100%" stop-color="#b51f7d" stop-opacity="0.96"/>
</radialGradient>

<!-- BLUE CLOUD -->
<radialGradient id="gCloud" cx="45%" cy="35%" r="70%">
  <stop offset="0%" stop-color="#ffffff"/>
  <stop offset="45%" stop-color="#d9fbff"/>
  <stop offset="100%" stop-color="#9fefff"/>
</radialGradient>

<!-- RING -->
<radialGradient id="gRing" cx="40%" cy="25%" r="75%">
  <stop offset="0%" stop-color="#d8ffff"/>
  <stop offset="25%" stop-color="#8ef2ff"/>
  <stop offset="60%" stop-color="#48c8ff"/>
  <stop offset="100%" stop-color="#1f7cff"/>
</radialGradient>

<!-- BUTTON -->
<radialGradient id="gBtn" cx="35%" cy="20%" r="80%">
  <stop offset="0%" stop-color="#ffffd6"/>
  <stop offset="35%" stop-color="#fff066"/>
  <stop offset="70%" stop-color="#d1c600"/>
  <stop offset="100%" stop-color="#857c00"/>
</radialGradient>

<!-- METAL -->
<radialGradient id="gMetal" cx="30%" cy="20%" r="80%">
  <stop offset="0%" stop-color="#ffffff"/>
  <stop offset="35%" stop-color="#e0e0e0"/>
  <stop offset="80%" stop-color="#7a7a7a"/>
  <stop offset="100%" stop-color="#2e2e2e"/>
</radialGradient>

<!-- BODY SHADOW -->
<filter id="fShadow" x="-50%" y="-50%" width="200%" height="200%">
  <feDropShadow dx="0" dy="18" stdDeviation="16"
    flood-color="#9a2f73"
    flood-opacity="0.45"/>
</filter>

<!-- GLOW -->
<filter id="fGlow">
  <feGaussianBlur stdDeviation="6" result="blur"/>
  <feMerge>
    <feMergeNode in="blur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

</defs>

<!-- MAIN BODY -->
<path
d="
M118 260
Q50 260 38 210
Q22 145 72 112
Q95 96 115 70
Q145 35 210 32
Q305 28 362 95
Q394 133 390 184
Q384 248 320 260
Q258 272 118 260
"
fill="url(#gBody)"
stroke="#ffb7ea"
stroke-width="3"
filter="url(#fShadow)"
/>

<!-- TOP GLOSS -->
<path
d="
M92 92
Q145 38 240 50
Q322 62 350 118
Q280 82 198 88
Q128 94 92 92
"
fill="rgba(255,255,255,0.35)"
/>

<!-- INNER TRANSLUCENT -->
<path
d="
M115 108
Q180 82 255 102
Q220 100 185 104
Q150 108 115 108
"
fill="rgba(255,255,255,0.16)"
/>

<!-- CLOUD RING -->
<ellipse
cx="245"
cy="115"
rx="100"
ry="68"
fill="url(#gRing)"
stroke="#c5ffff"
stroke-width="2"
/>

<!-- CLOUD INSIDE -->
<ellipse
cx="245"
cy="115"
rx="82"
ry="52"
fill="url(#gCloud)"
/>

<!-- EXTRA CLOUD SHAPES -->
<ellipse cx="220" cy="112" rx="32" ry="18" fill="rgba(255,255,255,.6)"/>
<ellipse cx="260" cy="102" rx="28" ry="16" fill="rgba(255,255,255,.55)"/>
<ellipse cx="275" cy="122" rx="34" ry="18" fill="rgba(255,255,255,.45)"/>

<!-- METAL DOTS -->
<g opacity=".95">

<circle cx="188" cy="56" r="5" fill="url(#gMetal)"/>
<circle cx="216" cy="47" r="5" fill="url(#gMetal)"/>
<circle cx="247" cy="45" r="5" fill="url(#gMetal)"/>
<circle cx="279" cy="50" r="5" fill="url(#gMetal)"/>
<circle cx="307" cy="62" r="5" fill="url(#gMetal)"/>
<circle cx="328" cy="82" r="5" fill="url(#gMetal)"/>
<circle cx="340" cy="110" r="5" fill="url(#gMetal)"/>
<circle cx="340" cy="138" r="5" fill="url(#gMetal)"/>

</g>

<!-- PLAY -->
<g class="btn" id="playBtn">

<ellipse
cx="88"
cy="188"
rx="22"
ry="18"
fill="url(#gBtn)"
stroke="#7d7700"
stroke-width="2"
/>

<polygon
points="82,178 82,198 98,188"
fill="#4e4800"
/>

</g>

<!-- PREV -->
<g class="btn" id="prevBtn">

<ellipse
cx="58"
cy="154"
rx="18"
ry="16"
fill="url(#gBtn)"
stroke="#7d7700"
stroke-width="2"
/>

<polygon
points="61,145 51,154 61,163"
fill="#4e4800"
/>

<polygon
points="70,145 60,154 70,163"
fill="#4e4800"
/>

</g>

<!-- NEXT -->
<g class="btn" id="nextBtn">

<ellipse
cx="120"
cy="154"
rx="18"
ry="16"
fill="url(#gBtn)"
stroke="#7d7700"
stroke-width="2"
/>

<polygon
points="113,145 123,154 113,163"
fill="#4e4800"
/>

<polygon
points="122,145 132,154 122,163"
fill="#4e4800"
/>

</g>

<!-- STOP -->
<g class="btn" id="stopBtn">

<ellipse
cx="88"
cy="228"
rx="20"
ry="18"
fill="url(#gBtn)"
stroke="#7d7700"
stroke-width="2"
/>

<rect
x="80"
y="220"
width="16"
height="16"
rx="2"
fill="#4e4800"
/>

</g>

<!-- TITLE -->
<text
id="trackTitle"
class="info"
x="185"
y="205"
font-size="11"
fill="#fff"
>
NO TRACK LOADED
</text>

<!-- ARTIST -->
<text
id="trackArtist"
class="info"
x="185"
y="223"
font-size="9"
fill="#ffe0ff"
>
CLICK NEXT TO LOAD SONG
</text>

<!-- TIMELINE -->
<rect
x="185"
y="242"
width="150"
height="6"
rx="3"
fill="#c9499f"
/>

<rect
id="progress"
x="185"
y="242"
width="0"
height="6"
rx="3"
fill="#fff"
/>

<!-- KNOB -->
<circle
id="seekKnob"
cx="185"
cy="245"
r="8"
fill="white"
stroke="#ff6bc7"
stroke-width="2"
/>

<!-- TIME -->
<text
id="timeText"
class="info"
x="260"
y="265"
font-size="9"
fill="#fff"
text-anchor="middle"
>
0:00 / 0:00
</text>

</svg>

</div>

<audio id="audio"></audio>

<script>

/* =========================
   AUDIO
========================= */

const audio = document.getElementById("audio");

const playBtn = document.getElementById("playBtn");
const nextBtn = document.getElementById("nextBtn");
const stopBtn = document.getElementById("stopBtn");

const progress = document.getElementById("progress");
const knob = document.getElementById("seekKnob");

const trackTitle = document.getElementById("trackTitle");
const trackArtist = document.getElementById("trackArtist");
const timeText = document.getElementById("timeText");

let playing = false;

/* =========================
   LOAD SONG
========================= */

nextBtn.addEventListener("click",()=>{

  const input = document.createElement("input");

  input.type = "file";
  input.accept = "audio/*";

  input.onchange = e=>{

    const file = e.target.files[0];

    if(!file) return;

    audio.src = URL.createObjectURL(file);

    const name = file.name.replace(/\.[^/.]+$/,"");

    const split = name.split("-");

    if(split.length > 1){
      trackArtist.textContent = split[0].trim().toUpperCase();
      trackTitle.textContent = split[1].trim().toUpperCase();
    }else{
      trackTitle.textContent = name.toUpperCase();
      trackArtist.textContent = "UNKNOWN ARTIST";
    }

    audio.play();
    playing = true;
  };

  input.click();

});

/* =========================
   PLAY
========================= */

playBtn.addEventListener("click",()=>{

  if(!audio.src) return;

  if(playing){
    audio.pause();
    playing = false;
  }else{
    audio.play();
    playing = true;
  }

});

/* =========================
   STOP
========================= */

stopBtn.addEventListener("click",()=>{

  audio.pause();
  audio.currentTime = 0;
  playing = false;

});

/* =========================
   UPDATE
========================= */

audio.addEventListener("timeupdate",()=>{

  const current = audio.currentTime;
  const duration = audio.duration || 0;

  const percent = current / duration;

  progress.setAttribute("width",percent * 150);

  knob.setAttribute("cx",185 + percent * 150);

  timeText.textContent =
    format(current) + " / " + format(duration);

});

function format(t){

  if(!t || isNaN(t)) return "0:00";

  const m = Math.floor(t/60);
  const s = Math.floor(t%60);

  return m + ":" + String(s).padStart(2,"0");

}

/* =========================
   DRAG PLAYER
========================= */

const widget = document.getElementById("player-widget");

let dragging = false;

let offsetX = 0;
let offsetY = 0;

widget.addEventListener("mousedown",(e)=>{

  if(e.target.closest(".btn")) return;

  dragging = true;

  offsetX = e.clientX - widget.offsetLeft;
  offsetY = e.clientY - widget.offsetTop;

});

document.addEventListener("mousemove",(e)=>{

  if(!dragging) return;

  widget.style.left = (e.clientX - offsetX) + "px";
  widget.style.top = (e.clientY - offsetY) + "px";

});

document.addEventListener("mouseup",()=>{

  dragging = false;

});

</script>

</body>
</html>
