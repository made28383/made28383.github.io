<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP3 Player Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: 'Georgia', serif;
    overflow: hidden;
  }

  /* Background page content simulation */
  .page-bg {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.08);
    font-size: 2rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    pointer-events: none;
    user-select: none;
  }

  /* ===================== PLAYER ===================== */
  #player {
    position: fixed;
    bottom: 40px;
    right: 40px;
    width: 340px;
    height: 340px;
    cursor: grab;
    user-select: none;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6)) drop-shadow(0 4px 8px rgba(0,0,0,0.4));
    transition: filter 0.2s;
    z-index: 9999;
  }
  #player:active { cursor: grabbing; filter: drop-shadow(0 28px 50px rgba(0,0,0,0.75)) drop-shadow(0 8px 16px rgba(0,0,0,0.5)); }
  #player.dragging { transition: none; }

  /* SVG fills the container */
  #player svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* ---- Defs: gradients & filters ---- */
  /* All defined inline inside SVG */

  /* ---- Button interactivity ---- */
  .btn-group { cursor: pointer; }
  .btn-group:hover .btn-face { filter: brightness(1.15); }
  .btn-group:active .btn-face { filter: brightness(0.88); transform-origin: center; transform: scale(0.96); }

  /* Volume slider thumb */
  #vol-thumb { cursor: ew-resize; }

  /* Song info text */
  #song-title-text {
    font-family: 'Georgia', serif;
    font-size: 7px;
    fill: #fff;
    opacity: 0.95;
  }
  #song-artist-text {
    font-family: 'Georgia', serif;
    font-size: 5.5px;
    fill: rgba(255,255,255,0.7);
  }
  #time-text {
    font-family: 'Courier New', monospace;
    font-size: 5px;
    fill: rgba(255,255,255,0.6);
  }
</style>
</head>
<body>

<div class="page-bg">Your page content here</div>

<div id="player">

<defs>

    <stop offset="0%" stop-color="#e060b8"/>
    <stop offset="45%" stop-color="#c0368a"/>
    <stop offset="100%" stop-color="#7a1055"/>
  </radialGradient>

  <!-- Body bevel highlight (top-left rim) -->
  <radialGradient id="bodyHighlight" cx="30%" cy="20%" r="50%">
    <stop offset="0%" stop-color="#f590d8" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#f590d8" stop-opacity="0"/>
  </radialGradient>

  <!-- Inner shadow for body depth -->
  <radialGradient id="bodyShadow" cx="70%" cy="80%" r="55%">
    <stop offset="0%" stop-color="#5a0038" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#5a0038" stop-opacity="0"/>
  </radialGradient>

  <!-- Handle ring gradient: hot pink -->
  <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ff5fae"/>
    <stop offset="40%" stop-color="#e0258a"/>
    <stop offset="100%" stop-color="#9b0058"/>
  </linearGradient>

  <!-- Handle highlight -->
  <linearGradient id="handleHL" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#ff9fd8" stop-opacity="0.8"/>
    <stop offset="50%" stop-color="#ff9fd8" stop-opacity="0"/>
  </linearGradient>

  <!-- Screen gradient: deep purple/teal display -->
  <radialGradient id="screenGrad" cx="40%" cy="35%" r="70%">
    <stop offset="0%" stop-color="#2a1545"/>
    <stop offset="60%" stop-color="#120a2a"/>
    <stop offset="100%" stop-color="#06040f"/>
  </radialGradient>
  <!-- Screen glass shine -->
  <linearGradient id="screenShine" x1="0%" y1="0%" x2="30%" y2="100%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
    <stop offset="45%" stop-color="#ffffff" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>

  <!-- Yellow/gold button gradient -->
  <radialGradient id="btnGrad" cx="40%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#f0e060"/>
    <stop offset="55%" stop-color="#c8a820"/>
    <stop offset="100%" stop-color="#8a6800"/>
  </radialGradient>
  <!-- Button highlight -->
  <linearGradient id="btnHL" x1="20%" y1="0%" x2="20%" y2="100%">
    <stop offset="0%" stop-color="#fffbaa" stop-opacity="0.9"/>
    <stop offset="40%" stop-color="#fffbaa" stop-opacity="0"/>
  </linearGradient>

  <!-- Stud gradient: metallic chrome -->
  <radialGradient id="studGrad" cx="35%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#e8e8e8"/>
    <stop offset="40%" stop-color="#a0a0a8"/>
    <stop offset="100%" stop-color="#404050"/>
  </radialGradient>

  <!-- Progress track -->
  <linearGradient id="trackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#3a1a5a"/>
    <stop offset="100%" stop-color="#180a30"/>
  </linearGradient>
  <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#e060ff"/>
    <stop offset="100%" stop-color="#ff60b8"/>
  </linearGradient>

  <!-- Volume track -->
  <linearGradient id="volTrackGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#e060ff"/>
    <stop offset="100%" stop-color="#3a1a5a"/>
  </linearGradient>

  <!-- Clip for progress bar -->
  <clipPath id="progressClip">
    <rect id="progressClipRect" x="156" y="183" width="0" height="3"/>
  </clipPath>

  <!-- Filters -->
  <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>

  <filter id="btnShadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#5a0038" flood-opacity="0.7"/>
  </filter>

  <filter id="studShadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0.5" dy="1" stdDeviation="0.8" flood-color="#000" flood-opacity="0.6"/>
  </filter>

  <filter id="screenGlow" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feColorMatrix type="matrix" values="0.5 0 0.5 0 0  0 0 0.3 0 0  0.5 0 1 0 0  0 0 0 0.4 0" in="blur" result="colorBlur"/>
    <feMerge><feMergeNode in="colorBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

</defs>

<circle id="status-light" cx="145" cy="220" r="3" fill="#ff0060" opacity="0.9">

</circle>

</div>

<script>
// ===================== STATE =====================
const state = {
  playing: false,
  progress: 0,       // 0–1
  volume: 0.5,       // 0–1
  duration: 225,     // seconds (3:45)
  elapsed: 0,        // seconds
  songs: [
    { title: '♪ Dream Sequencer', artist: 'Synthwave Collective', duration: 225 },
    { title: '♪ Neon Cascade', artist: 'Aurora Drive', duration: 198 },
    { title: '♪ Crystal Void', artist: 'Prism Echo', duration: 242 },
  ],
  songIndex: 0,
  ticker: null,
  isDragging: false,
};

// ===================== DOM REFS =====================
const player   = document.getElementById('player');
const iconPlay  = document.getElementById('icon-play');
const iconPause = document.getElementById('icon-pause');
const progFill  = document.getElementById('progress-fill');
const progSeek  = document.getElementById('progress-seeker');
const volFill   = document.getElementById('vol-fill');
const volThumb  = document.getElementById('vol-thumb');
const volThumbShape = document.getElementById('vol-thumb-shape');
const titleText = document.getElementById('song-title-text');
const artistText= document.getElementById('song-artist-text');
const timeCur   = document.getElementById('time-current');
const timeTot   = document.getElementById('time-total');
const statusLight = document.getElementById('status-light');
const statusAnim  = document.getElementById('statusAnim');
const statusLabel = statusLight.nextElementSibling;
const eqBars    = [1,2,3,4,5].map(i => document.getElementById('ec' + i) || document.getElementById('eq' + i));

// Progress bar geometry (from SVG viewBox)
const PROG_X = 131, PROG_W = 90;
// Volume bar geometry
const VOL_X = 178.1, VOL_W = 48.86;

// ===================== FORMAT TIME =====================
function fmt(s) {
  s = Math.round(s);
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}

// ===================== UPDATE UI =====================
function updateUI() {
  const prog = state.progress;
  const fillW = prog * PROG_W;
  progFill.setAttribute('width', fillW);
  progSeek.setAttribute('cx', PROG_X + fillW);

  const vFill = state.volume * VOL_W;
  volFill.setAttribute('width', vFill);
  // move vol thumb (hexagon) - translate its center
  const thumbCX = VOL_X + vFill;
  const dx = thumbCX - 184.365; // original center
  volThumb.setAttribute('transform', `translate(${dx},0)`);

  timeCur.textContent = fmt(state.elapsed);
  timeTot.textContent = fmt(state.duration);
}

function updateSong() {
  const s = state.songs[state.songIndex];
  titleText.textContent = s.title;
  artistText.textContent = s.artist;
  state.duration = s.duration;
  state.elapsed = 0;
  state.progress = 0;
  updateUI();
}

function setPlaying(val) {
  state.playing = val;
  iconPlay.setAttribute('display', val ? 'none' : 'inline');
  iconPause.setAttribute('display', val ? 'inline' : 'none');
  statusLabel.textContent = val ? 'PLAY' : 'PAUSE';
  statusLight.style.fill = val ? '#00ff80' : '#ff0060';
  if (val) {
    statusAnim.setAttribute('dur','0.8s');
    animateEQ(true);
    state.ticker = setInterval(tick, 200);
  } else {
    statusAnim.setAttribute('dur','2s');
    animateEQ(false);
    clearInterval(state.ticker);
    state.ticker = null;
  }
}

// ===================== EQ ANIMATION =====================
const eqTargets = [0,0,0,0,0];
const eqCurrents = [8,11,6,10,7];
const eqMax = [14,18,12,16,13];
let eqRaf = null;

function animateEQ(on) {
  if (!on) {
    cancelAnimationFrame(eqRaf);
    // shrink all bars
    [1,2,3,4,5].forEach((n,i) => {
      const el = document.getElementById('eq'+n);
      if (el) { el.setAttribute('height', 2); el.setAttribute('y', 124); }
    });
    return;
  }
  function step() {
    [1,2,3,4,5].forEach((n,i) => {
      const el = document.getElementById('eq'+n);
      if (!el) return;
      const h = 3 + Math.random() * eqMax[i];
      const baseY = 126;
      el.setAttribute('height', h.toFixed(1));
      el.setAttribute('y', (baseY - h).toFixed(1));
    });
    eqRaf = setTimeout(() => requestAnimationFrame(step), 120 + Math.random()*80);
  }
  step();
}

// ===================== TICK =====================
function tick() {
  if (!state.playing) return;
  state.elapsed += 0.2;
  if (state.elapsed >= state.duration) {
    state.elapsed = state.duration;
    state.progress = 1;
    updateUI();
    nextSong();
    return;
  }
  state.progress = state.elapsed / state.duration;
  updateUI();
}

function nextSong() {
  setPlaying(false);
  state.songIndex = (state.songIndex + 1) % state.songs.length;
  updateSong();
  setTimeout(() => setPlaying(true), 400);
}

// ===================== BUTTON HANDLERS =====================
function onBtnClick(btn) {
  if (state.isDragging) return;
  switch(btn) {
    case 'playpause':
      setPlaying(!state.playing);
      break;
    case 'stop':
      setPlaying(false);
      state.elapsed = 0;
      state.progress = 0;
      updateUI();
      break;
    case 'next':
      setPlaying(false);
      state.songIndex = (state.songIndex + 1) % state.songs.length;
      updateSong();
      if (state.playing || true) setTimeout(() => setPlaying(true), 200);
      break;
    case 'rewind':
      if (state.elapsed > 3) {
        state.elapsed = 0;
        state.progress = 0;
        updateUI();
      } else {
        setPlaying(false);
        state.songIndex = (state.songIndex - 1 + state.songs.length) % state.songs.length;
        updateSong();
        setTimeout(() => setPlaying(true), 200);
      }
      break;
    case 'ff':
      state.elapsed = Math.min(state.elapsed + 15, state.duration - 1);
      state.progress = state.elapsed / state.duration;
      updateUI();
      break;
  }
}

// ===================== PROGRESS BAR SEEK =====================
let seekDragging = false;
progSeek.addEventListener('mousedown', e => { seekDragging = true; e.stopPropagation(); });

document.addEventListener('mousemove', e => {
  if (!seekDragging) return;
  const svgEl = player.querySelector('svg');
  const rect = svgEl.getBoundingClientRect();
  const svgW = 300; // viewBox width
  const scaleX = svgW / rect.width;
  const svgX = (e.clientX - rect.left) * scaleX;
  const p = Math.max(0, Math.min(1, (svgX - PROG_X) / PROG_W));
  state.progress = p;
  state.elapsed = p * state.duration;
  updateUI();
});
document.addEventListener('mouseup', () => { seekDragging = false; });

// ===================== VOLUME DRAG =====================
let volDragging = false;
volThumb.addEventListener('mousedown', e => { volDragging = true; e.stopPropagation(); });

document.addEventListener('mousemove', e => {
  if (!volDragging) return;
  const svgEl = player.querySelector('svg');
  const rect = svgEl.getBoundingClientRect();
  const scaleX = 300 / rect.width;
  const svgX = (e.clientX - rect.left) * scaleX;
  const v = Math.max(0, Math.min(1, (svgX - VOL_X) / VOL_W));
  state.volume = v;
  updateUI();
});
document.addEventListener('mouseup', () => { volDragging = false; });

// ===================== DRAGGING PLAYER =====================
let dragOffX = 0, dragOffY = 0, dragging = false;

player.addEventListener('mousedown', e => {
  if (seekDragging || volDragging) return;
  dragging = true;
  state.isDragging = false;
  const rect = player.getBoundingClientRect();
  dragOffX = e.clientX - rect.left;
  dragOffY = e.clientY - rect.top;
  player.classList.add('dragging');
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  state.isDragging = true;
  const x = e.clientX - dragOffX;
  const y = e.clientY - dragOffY;
  player.style.left = x + 'px';
  player.style.top  = y + 'px';
  player.style.right = 'auto';
  player.style.bottom = 'auto';
});

document.addEventListener('mouseup', e => {
  if (!dragging) return;
  dragging = false;
  player.classList.remove('dragging');
  setTimeout(() => { state.isDragging = false; }, 50);
});

// Touch support
player.addEventListener('touchstart', e => {
  const t = e.touches[0];
  dragging = true;
  state.isDragging = false;
  const rect = player.getBoundingClientRect();
  dragOffX = t.clientX - rect.left;
  dragOffY = t.clientY - rect.top;
  player.classList.add('dragging');
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!dragging) return;
  state.isDragging = true;
  const t = e.touches[0];
  player.style.left = (t.clientX - dragOffX) + 'px';
  player.style.top  = (t.clientY - dragOffY) + 'px';
  player.style.right = 'auto';
  player.style.bottom = 'auto';
}, { passive: true });

document.addEventListener('touchend', () => {
  dragging = false;
  player.classList.remove('dragging');
  setTimeout(() => { state.isDragging = false; }, 50);
});

// ===================== INIT =====================
updateSong();
updateUI();
setPlaying(false);
</script>
