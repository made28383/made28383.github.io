<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive MP3 Widget</title>
    <style>
        :root {
            --pink-main: #d6509d;
            --pink-dark: #8b2d61;
            --pink-light: #f48bc4;
            --gold-btn: #d4c164;
        }

        body {
            margin: 0;
            height: 100vh;
            /* Placeholder background to demonstrate transparency */
            background: linear-gradient(45deg, #1a1a1a 25%, #262626 25%, #262626 50%, #1a1a1a 50%, #1a1a1a 75%, #262626 75%, #262626 100%);
            background-size: 40px 40px;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #player-container {
            position: fixed;
            width: 450px;
            height: 350px;
            cursor: grab;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
            user-select: none;
            z-index: 1000;
            bottom: 50px;
            right: 50px;
        }

        #player-container:active { cursor: grabbing; }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* 3D Bevel Effects */
        .bevel-body { fill: url(#bodyGrad); filter: url(#dropShadow); }
        .ring-bevel { fill: url(#ringGrad); stroke: var(--pink-dark); stroke-width: 1; }
        
        .btn {
            cursor: pointer;
            transition: transform 0.1s, filter 0.1s;
        }
        .btn:hover { filter: brightness(1.1); }
        .btn:active { transform: scale(0.95); filter: brightness(0.9); }

        /* Sun Animation */
        @keyframes sunBeat {
            0% { transform: scale(1); filter: saturate(1) blur(0px); }
            50% { transform: scale(1.1); filter: saturate(1.5) blur(2px); }
            100% { transform: scale(1); filter: saturate(1) blur(0px); }
        }

        .playing #sun-group {
            animation: sunBeat 0.5s infinite ease-in-out;
            transform-origin: 300px 100px;
        }

        #screen-hole {
            fill: transparent;
            pointer-events: none;
        }

        .text-label {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            pointer-events: none;
            fill: #fff;
            font-size: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="player-container">
    <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <radialGradient id="bodyGrad" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#f48bc4" />
                <stop offset="60%" stop-color="#d6509d" />
                <stop offset="100%" stop-color="#8b2d61" />
            </radialGradient>

            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#b5367a" />
                <stop offset="50%" stop-color="#f48bc4" />
                <stop offset="100%" stop-color="#b5367a" />
            </linearGradient>

            <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff700" />
                <stop offset="70%" stop-color="#ff8800" />
                <stop offset="100%" stop-color="#ff4400" />
            </radialGradient>

            <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
                <feOffset dx="2" dy="4" />
                <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
                <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>

            <clipPath id="ringClip">
                <path d="M117.82,143.97c-2.21-6.71-6.69-23.68,1.27-40.99,15.61-33.96,63.33-34.94,66.77-34.96,28.68-.18,58.84,14.6,72.69,40.99,3.75,7.15,13.89,26.48,6.34,39.38-12.79,21.86-72.31,18.42-147.06-4.42Z" />
            </clipPath>
            
            <mask id="holeMask">
                <rect width="400" height="300" fill="white" />
                <path d="M122.19,136.72c-3.46-6.12-1.68-13.4,0-20.23,3.4-13.86,12.37-22.19,15.27-24.81,12.96-11.72,28.03-13.44,37.4-14.5,7.61-.87,29.07-3,50,9.92,11.24,6.94,17.6,15.3,20.99,19.85,4.95,6.64,11.38,15.49,12.21,27.86.31,4.66.63,9.47-2.29,13.74-1.18,1.73-5.28,6.86-23.66,8.02-11.13.7-18.88-.6-30.15-2.29-21.22-3.18-7.48-.64-35.88-4.96-34.6-5.27-40.66-6.87-43.89-12.6Z" fill="black" />
            </mask>
        </defs>

        <g id="sun-group" clip-path="url(#ringClip)">
            <circle cx="300" cy="100" r="50" fill="url(#sunGrad)" />
            <path d="M300,30 L310,50 L290,50 Z" fill="#ff4400" transform="rotate(0, 300, 100)" />
            <path d="M300,30 L310,50 L290,50 Z" fill="#ff4400" transform="rotate(45, 300, 100)" />
            <path d="M300,30 L310,50 L290,50 Z" fill="#ff4400" transform="rotate(90, 300, 100)" />
            <path d="M300,30 L310,50 L290,50 Z" fill="#ff4400" transform="rotate(135, 300, 100)" />
            <path d="M300,30 L310,50 L290,50 Z" fill="#ff4400" transform="rotate(180, 300, 100)" />
            <path d="M300,30 L310,50 L290,50 Z" fill="#ff4400" transform="rotate(225, 300, 100)" />
            <path d="M300,30 L310,50 L290,50 Z" fill="#ff4400" transform="rotate(270, 300, 100)" />
            <path d="M300,30 L310,50 L290,50 Z" fill="#ff4400" transform="rotate(315, 300, 100)" />
        </g>

        <path d="M103.01,218.59c-26.84,2.6-45.87,8.38-62.25-3.34-16.75-11.98-18.98-33.85-19.33-39.75-.97-16.29,4.94-36.59,20.49-47.92,16.31-11.89,28.03-2.84,48.72-13.74,21.04-11.1,17.95-25.23,35.18-39.38,25.96-21.3,75.13-23.84,110.58-1.49,5.77,3.64,37.32,24.42,41.76,62.04,4.52,38.31-21.27,75.49-52.2,89.16-35.72,15.78-49.02-12.74-122.95-5.57Z" 
              class="bevel-body" mask="url(#holeMask)" />

        <path d="M117.82,143.97c-2.21-6.71-6.69-23.68,1.27-40.99,15.61-33.96,63.33-34.94,66.77-34.96,28.68-.18,58.84,14.6,72.69,40.99,3.75,7.15,13.89,26.48,6.34,39.38-12.79,21.86-72.31,18.42-147.06-4.42Z" 
              class="ring-bevel" fill="none" stroke-width="2" />

        <g class="btn" id="play_x2F_stop_button">
            <path d="M67.28,172.46c-2.36-5.35,3.69-11.89,10.68-12.17,6.43-.26,12.34,4.84,13.19,9.43.63,3.4-1.15,8.49-6.91,9.82-6.45,1.48-14.91-2.43-16.96-7.07Z" fill="#d4c164" stroke="#8c7d3d" />
            <text x="73" y="174" class="text-label" style="fill:#3a3a00; font-size: 8px;">▷||</text>
        </g>

        <g class="btn" id="next_song_button">
            <path d="M79.26,155.43c-6.53-.35-11.93-11.85-10.15-18.4,2.37-8.71,17.38-9.57,20.08-2.11,2.28,6.3-2.49,20.92-9.93,20.51Z" fill="#d4c164" stroke="#8c7d3d" />
            <text x="81" y="145" class="text-label" transform="rotate(-10, 81, 145)" style="fill:#3a3a00;">≫</text>
        </g>

        <g class="btn" id="rewind_button">
            <path d="M63.47,171.1c.09-3.76-10.41-10.53-19.42-7.09-7.37,2.82-9.75,10.94-6.83,13.73,4.64,4.44,26.12-1.32,26.25-6.65Z" fill="#d4c164" stroke="#8c7d3d" />
            <text x="43" y="174" class="text-label" style="fill:#3a3a00;">≪</text>
        </g>

        <g class="btn" id="close_button">
            <path d="M76.63,185.19c-4.97,3.72-7.28,17.9-5.22,24.13,3.1,9.38,17.22,3.94,18.27-5.22.88-7.58-6.49-23.82-13.05-18.91Z" fill="#d4c164" stroke="#8c7d3d" />
            <text x="80" y="202" class="text-label" style="fill:#3a3a00;">■</text>
        </g>

        <g id="rainbow-volume" transform="translate(180, 210)">
            <path d="M0,40 A40,40 0 0,1 80,40" fill="none" stroke="red" stroke-width="4" />
            <path d="M5,40 A35,35 0 0,1 75,40" fill="none" stroke="orange" stroke-width="4" />
            <path d="M10,40 A30,30 0 0,1 70,40" fill="none" stroke="yellow" stroke-width="4" />
            <path d="M15,40 A25,25 0 0,1 65,40" fill="none" stroke="green" stroke-width="4" />
            <path d="M20,40 A20,20 0 0,1 60,40" fill="none" stroke="blue" stroke-width="4" />
            <circle id="volume-knob" cx="40" cy="5" r="5" fill="#fff" stroke="#999" class="btn" />
        </g>

        <rect x="180" y="190" width="120" height="4" rx="2" fill="#4e1b36" />
        <rect id="progress-bar" x="180" y="190" width="0" height="4" rx="2" fill="#f48bc4" />
        <circle id="seeker" cx="180" cy="192" r="4" fill="#fff" class="btn" />
    </svg>
</div>

<script>
    const player = document.getElementById('player-container');
    const playBtn = document.getElementById('play_x2F_stop_button');
    const progressBar = document.getElementById('progress-bar');
    const seeker = document.getElementById('seeker');
    
    let isPlaying = false;
    let progress = 0;

    // Draggable Functionality
    let isDragging = false;
    let currentX;
    let currentY;
    let initialX;
    let initialY;
    let xOffset = 0;
    let yOffset = 0;

    player.addEventListener("mousedown", dragStart);
    document.addEventListener("mousemove", drag);
    document.addEventListener("mouseup", dragEnd);

    function dragStart(e) {
        if (e.target.closest('.btn')) return; // Don't drag if clicking buttons
        initialX = e.clientX - xOffset;
        initialY = e.clientY - yOffset;
        isDragging = true;
    }

    function drag(e) {
        if (isDragging) {
            e.preventDefault();
            currentX = e.clientX - initialX;
            currentY = e.clientY - initialY;
            xOffset = currentX;
            yOffset = currentY;
            setTranslate(currentX, currentY, player);
        }
    }

    function setTranslate(xPos, yPos, el) {
        el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0)`;
    }

    function dragEnd() {
        initialX = currentX;
        initialY = currentY;
        isDragging = false;
    }

    // Interactive States
    playBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        if (isPlaying) {
            player.classList.add('playing');
        } else {
            player.classList.remove('playing');
        }
    });

    // Simulated Progress Rhythm
    setInterval(() => {
        if (isPlaying) {
            progress = (progress + 0.5) % 100;
            const barWidth = (progress / 100) * 120;
            progressBar.setAttribute('width', barWidth);
            seeker.setAttribute('cx', 180 + barWidth);
        }
    }, 50);

</script>

</body>
</html>
