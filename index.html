  #player {
    position: fixed;
    top: 80px; left: 80px;
    width: 360px;
    height: 360px;
    cursor: grab;
    user-select: none;
    filter: drop-shadow(0 22px 26px rgba(0,0,0,.6)) drop-shadow(0 4px 6px rgba(0,0,0,.4));

    z-index: 9999;
  }
  #player.dragging { cursor: grabbing; }
  #player svg { width: 100%; height: 100%; display: block; overflow: visible; }

  /* Buttons interactive states */
  .btn { cursor: pointer; transition: transform .08s ease; transform-box: fill-box; transform-origin: center; }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: scale(.94); }
  .icon { pointer-events: none; }

  /* Screen text */
  .screen-text {
    font-family: "Courier New", monospace;
    font-weight: bold;
    fill: #2a1a2e;
    text-anchor: middle;

<div class="page-hint">Lohista mängijat hiirega ✦ Vajuta nuppe ✦ Vikerkaaresädelus järgneb sulle</div>


<div id="player">
<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pink body gradient -->
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#ff8fc8"/>
      <stop offset="55%" stop-color="#d94a92"/>
      <stop offset="100%" stop-color="#7a1f4d"/>
    </radialGradient>
    <linearGradient id="bodyRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".6"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity=".5"/>
    </linearGradient>

    <!-- Screen edge (inner ring around screen) -->
    <radialGradient id="ringGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ff5a9e"/>
      <stop offset="100%" stop-color="#8a1f55"/>
    </radialGradient>

    <!-- Gold buttons -->
    <radialGradient id="goldGrad" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fff6b0"/>
      <stop offset="55%" stop-color="#d9b94a"/>
      <stop offset="100%" stop-color="#7a5a14"/>
    </radialGradient>

    <!-- Screen LCD -->
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfe8b8"/>
      <stop offset="100%" stop-color="#7fa86a"/>
    </linearGradient>

    <!-- Rainbow gradient for volume track -->
    <linearGradient id="rainbowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ff2d55"/>
      <stop offset="17%"  stop-color="#ff8a1f"/>
      <stop offset="34%"  stop-color="#ffd60a"/>
      <stop offset="50%"  stop-color="#34c759"/>
      <stop offset="67%"  stop-color="#00c7ff"/>
      <stop offset="84%"  stop-color="#5e5ce6"/>
      <stop offset="100%" stop-color="#bf5af2"/>
    </linearGradient>

    <!-- Glossy top highlight across the body -->
    <linearGradient id="glossGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity=".55"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity=".05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Studs around the ring -->
    <radialGradient id="studGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="60%" stop-color="#888"/>
      <stop offset="100%" stop-color="#222"/>
    </radialGradient>

    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>

  for (let i = 0; i < count; i++){
    const p = path.getPointAtLength((i / count) * total);
    const stud = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    stud.setAttribute('cx', p.x);
    stud.setAttribute('cy', p.y);
    stud.setAttribute('rx', 2.4);
    stud.setAttribute('ry', 1.7);
    stud.setAttribute('fill','url(#studHi)');

    stud.setAttribute('stroke','#1a1a1a');
    stud.setAttribute('stroke-width','.3');
    ringG.appendChild(stud);
  }
})();

/* ---------------- Dragging ---------------- */
(function dragger(){
  const el = document.getElementById('player');
  let dx=0, dy=0, dragging=false, lastX=0, lastY=0;
  el.addEventListener('pointerdown', e => {
    if (e.target.closest('.btn')) return;
    if (e.target.closest('#volumeGroup')) return;
    if (e.target.closest('#progressGroup')) return;

    dragging = true;
    el.classList.add('dragging');
    const r = el.getBoundingClientRect();
    dx = e.clientX - r.left;
    dy = e.clientY - r.top;
    lastX = e.clientX; lastY = e.clientY;
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove', e => {
    if (!dragging) return;
    el.style.left = (e.clientX - dx) + 'px';
    el.style.top  = (e.clientY - dy) + 'px';
    const r = el.getBoundingClientRect();
    const cx = r.left + r.width/2;
    const cy = r.top + r.height/2;
    const moveD = Math.hypot(e.clientX - lastX, e.clientY - lastY);
    const n = Math.min(6, 1 + Math.floor(moveD / 8));
    lastX = e.clientX; lastY = e.clientY;
  });
  const end = () => { dragging = false; el.classList.remove('dragging'); };
  el.addEventListener('pointerup', end);
  el.addEventListener('pointercancel', end);
})();

(function buildRays(){
  const g = document.getElementById('raysPulse');

  const longFlame  = 'M 0 -13 C -4 -17 -3 -22 -2 -26 C -1 -30 -5 -33 -2 -36 C 0 -38 2 -36 1 -33 C 0 -29 4 -26 3 -22 C 2 -18 4 -16 0 -13 Z';

  for (let i=0; i<count; i++){

/* ---------------- Sun face texture (watercolor speckles) ---------------- */
(function decorateSun(){
  const svgNS = 'http://www.w3.org/2000/svg';
  const parent = document.getElementById('sunGroup');
  const deco = document.createElementNS(svgNS, 'g');
  deco.setAttribute('clip-path', 'circle(11.5px at 190px 117px)');
  deco.setAttribute('pointer-events', 'none');

  // Subtle inner shadow rim for watercolor depth
  const rim = document.createElementNS(svgNS, 'circle');
  rim.setAttribute('cx', 190); rim.setAttribute('cy', 117);
  rim.setAttribute('r', 11.2);
  rim.setAttribute('fill', 'none');
  rim.setAttribute('stroke', '#b46410');
  rim.setAttribute('stroke-width', 0.6);
  rim.setAttribute('opacity', 0.35);
  deco.appendChild(rim);

  // Random tiny white speckles like the reference watercolor texture
  const seed = [0.21,0.78,0.43,0.11,0.92,0.55,0.34,0.67,0.05,0.88,0.49,0.27,0.71,0.16,0.83,0.39,0.62,0.08,0.95,0.52,0.30,0.74,0.18,0.86];
  for (let i=0; i<22; i++){
    const a = seed[i % seed.length] * Math.PI * 2 + i * 0.7;
    const r = (seed[(i*3) % seed.length]) * 9.5;
    const dot = document.createElementNS(svgNS, 'circle');
    dot.setAttribute('cx', 190 + Math.cos(a)*r);
    dot.setAttribute('cy', 117 + Math.sin(a)*r);
    dot.setAttribute('r', 0.25 + seed[(i*5) % seed.length]*0.5);
    dot.setAttribute('fill', '#fff6d8');
    dot.setAttribute('opacity', 0.7);
    deco.appendChild(dot);
  }

  parent.appendChild(deco);
})();

];
let trackIndex = 0;
const audio = new Audio();
audio.preload = 'auto';
audio.playsInline = true;

const state = {
  playing:  false,
  sunVisible: true,
  duration: 1,
  elapsed:  0,
  volume:   0.5,
  artist:   playlist[0].artist,
  title:    playlist[0].title,
};
audio.volume = state.volume;

function ensureTrackUrl(track){
  if (track.url) return track.url;
  const binary = atob(track.base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  track.url = URL.createObjectURL(new Blob([bytes], { type: 'audio/mpeg' }));
  return track.url;
}

async function playCurrentTrack(){
  try {
    const track = playlist[trackIndex];
    const nextSrc = ensureTrackUrl(track);
    if (audio.src !== nextSrc) {
      audio.src = nextSrc;
      audio.load();
    }
    await audio.play();
    state.playing = true;
  } catch (error) {
    state.playing = false;
    console.error('Playback failed:', error);
  }
  window.__renderPlayer && window.__renderPlayer();
}

function loadTrack(i, autoplay){
  trackIndex = (i + playlist.length) % playlist.length;
  const t = playlist[trackIndex];
  audio.pause();
  audio.src = ensureTrackUrl(t);
  audio.load();
  state.artist = t.artist;
  state.title  = t.title;
  state.elapsed = 0;
  state.duration = 1;
  if (autoplay){
    playCurrentTrack();
  } else {
    state.playing = false;
    window.__renderPlayer && window.__renderPlayer();
  }
}

window.addEventListener('beforeunload', () => {
  playlist.forEach(track => {
    if (track.url) URL.revokeObjectURL(track.url);
  });
});
audio.addEventListener('loadedmetadata', () => {
  state.duration = isFinite(audio.duration) && audio.duration > 0 ? audio.duration : 1;
  window.__renderPlayer && window.__renderPlayer();
});
audio.addEventListener('timeupdate', () => {
  state.elapsed = audio.currentTime;
  window.__renderPlayer && window.__renderPlayer();
});
audio.addEventListener('ended', () => { loadTrack(trackIndex + 1, true); });
audio.addEventListener('play',  () => { state.playing = true;  window.__renderPlayer && window.__renderPlayer(); });
audio.addEventListener('pause', () => { state.playing = false; window.__renderPlayer && window.__renderPlayer(); });

/* ---------------- Sun animation (freezes on pause) ---------------- */
(function animate(){
  const rotateG = document.getElementById('raysRotate');
  const pulseG  = document.getElementById('raysPulse');
  const halo    = document.getElementById('sunHalo');
  const sun     = document.getElementById('sunBody');
  let lastNow = performance.now();
  let phase = 0, angle = 0;
  function frame(now){
    const dt = (now - lastNow) / 1000;
    lastNow = now;
    if (state.playing){
      phase += dt * (120/60) * Math.PI;
      angle = (angle + dt * 30) % 360;
    }
    const beat = (Math.sin(phase) + 1) / 2;
    rotateG.setAttribute('transform', `rotate(${angle})`);
    const scale = state.playing ? (0.85 + beat * 0.35) : 1;
    pulseG.setAttribute('transform', `scale(${scale})`);
    halo.setAttribute('r', state.playing ? (22 + beat * 14) : 26);
    halo.setAttribute('opacity', state.playing ? (0.55 + beat * 0.35) : 0.6);
    sun.setAttribute('r', state.playing ? (10 + beat * 2.2) : 11);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

/* ---------------- Volume slider (rainbow) ---------------- */
(function volume(){
  const group = document.getElementById('volumeGroup');
  const knob  = document.getElementById('volKnob');
  const dim   = document.getElementById('volDim');
  const svg   = document.querySelector('#player svg');
  const X0 = 168, X1 = 218;
  let dragging = false;
  function render(){
    const x = X0 + state.volume * (X1 - X0);
    knob.setAttribute('cx', x);
    dim.setAttribute('x', x);
    dim.setAttribute('width', Math.max(0, X1 - x));
  }
  function setFromEvent(e){
    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const loc = pt.matrixTransform(svg.getScreenCTM().inverse());
    state.volume = Math.max(0, Math.min(1, (loc.x - X0) / (X1 - X0)));
    audio.volume = state.volume;
    render();
  }
  group.addEventListener('pointerdown', e => {
    e.stopPropagation();
    dragging = true;
    group.setPointerCapture(e.pointerId);
    setFromEvent(e);
  });
  group.addEventListener('pointermove', e => { if (dragging) setFromEvent(e); });
  const end = () => { dragging = false; };
  group.addEventListener('pointerup', end);
  group.addEventListener('pointercancel', end);
  render();
})();

/* ---------------- Progress bar (draggable scrub) ---------------- */
(function progress(){
  const group = document.getElementById('progressGroup');
  const svg   = document.querySelector('#player svg');
  const X0 = 148, X1 = 238;
  let dragging = false;
  function setFromEvent(e){
    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const loc = pt.matrixTransform(svg.getScreenCTM().inverse());
    const pct = Math.max(0, Math.min(1, (loc.x - X0) / (X1 - X0)));
    state.elapsed = pct * state.duration;
    if (isFinite(state.duration) && state.duration > 0) audio.currentTime = state.elapsed;
    window.__renderPlayer && window.__renderPlayer();
  }
  group.addEventListener('pointerdown', e => {
    e.stopPropagation();
    dragging = true;
    group.setPointerCapture(e.pointerId);
    setFromEvent(e);
  });
  group.addEventListener('pointermove', e => { if (dragging) setFromEvent(e); });
  const end = () => { dragging = false; };
  group.addEventListener('pointerup', end);
  group.addEventListener('pointercancel', end);
})();

/* ---------------- Controls + display ---------------- */
(function controls(){
  const titleEl   = document.getElementById('titleText');
  const artistEl  = document.getElementById('artistText');
  const elapsedEl = document.getElementById('elapsedText');
  const remainEl  = document.getElementById('remainText');
  const fill      = document.getElementById('progressFill');
  const knob      = document.getElementById('seekerKnob');
  const sunGroup  = document.getElementById('sunGroup');

  function fmt(s){
    s = Math.max(0, Math.floor(s));
    const m = Math.floor(s/60), sec = s%60;
    return m + ':' + String(sec).padStart(2,'0');
  }
  function render(){
    titleEl.textContent  = state.title;
    artistEl.textContent = state.artist;
    elapsedEl.textContent = fmt(state.elapsed);
    remainEl.textContent  = '-' + fmt(Math.max(0, state.duration - state.elapsed));
    const pct = state.duration ? state.elapsed / state.duration : 0;
    const x = 148 + pct * 90;
    fill.setAttribute('width', pct * 90);
    knob.setAttribute('points', `${x},185 ${x+3},182 ${x-3},182`);
    sunGroup.style.display = state.sunVisible ? '' : 'none';
  }
  window.__renderPlayer = render;

  function handleAction(action){
    switch(action){
      case 'play':
        if (audio.paused) {
          playCurrentTrack();
        } else {
          audio.pause();
        }
        break;
      case 'stop':
        audio.pause();
        audio.currentTime = 0;
        state.elapsed = 0;
        state.sunVisible = !state.sunVisible;
        break;
      case 'next':
        loadTrack(trackIndex + 1, !audio.paused || state.playing);
        break;
      case 'rewind':
        audio.currentTime = Math.max(0, audio.currentTime - 10);
        state.elapsed = audio.currentTime;
        break;
      case 'forward':
        audio.currentTime = Math.min(state.duration, audio.currentTime + 10);
        state.elapsed = audio.currentTime;
        break;
    }
    render();
  }

  document.querySelectorAll('.btn').forEach(b => {
    b.addEventListener('pointerdown', e => {
      e.preventDefault();
      e.stopPropagation();
      handleAction(b.dataset.action);
    });
  });

  loadTrack(0, false);
  render();
})();


</script>
