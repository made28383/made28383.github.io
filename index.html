<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interaktiivsed Lilled</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        overflow:hidden;
        background:
            radial-gradient(circle at top, #5b0000 0%, #2b0000 45%, #120000 100%);
        height:100vh;
    }

    canvas{
        display:block;
    }

    .text{
        position:absolute;
        top:20px;
        left:20px;
        color:rgba(255,255,255,0.55);
        font-family:Arial, sans-serif;
        font-size:14px;
        letter-spacing:1px;
        pointer-events:none;
    }
</style>
</head>
<body>

<div class="text">Liiguta hiirt üle lillede ✿</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    createFlowers();
});

const mouse = {
    x: w / 2,
    y: h / 2
};

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

class Flower {
    constructor(x, y, size){
        this.x = x;
        this.y = y;

        this.baseSize = size;
        this.size = size;

        this.rotation = Math.random() * Math.PI * 2;

        this.petals = 7 + Math.floor(Math.random() * 5);

        this.floatOffset = Math.random() * 1000;
    }

    drawPetal(angle){
        ctx.save();

        ctx.rotate(angle);

        ctx.beginPath();

        ctx.moveTo(0, 0);

        ctx.bezierCurveTo(
            this.size * 0.3,
            -this.size * 0.3,

            this.size * 0.9,
            this.size * 0.6,

            0,
            this.size * 1.8
        );

        ctx.bezierCurveTo(
            -this.size * 0.9,
            this.size * 0.6,

            -this.size * 0.3,
            -this.size * 0.3,

            0,
            0
        );

        ctx.fillStyle = "rgba(255,255,255,0.97)";
        ctx.shadowColor = "rgba(255,255,255,0.8)";
        ctx.shadowBlur = 18;

        ctx.fill();

        ctx.restore();
    }

    draw(time){

        const floatY = Math.sin(time * 0.001 + this.floatOffset) * 2;

        ctx.save();

        ctx.translate(this.x, this.y + floatY);

        ctx.rotate(this.rotation);

        for(let i = 0; i < this.petals; i++){

            const angle = (Math.PI * 2 / this.petals) * i;

            this.drawPetal(angle);
        }

        // lille keskosa
        ctx.beginPath();
        ctx.arc(0, 0, this.size * 0.32, 0, Math.PI * 2);

        ctx.fillStyle = "#f6e7b0";
        ctx.shadowBlur = 12;

        ctx.fill();

        ctx.restore();
    }

    update(time){

        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;

        const dist = Math.sqrt(dx * dx + dy * dy);

        const radius = 180;

        let target = this.baseSize;

        if(dist < radius){
            const power = 1 - dist / radius;
            target = this.baseSize + power * this.baseSize * 1.8;
        }

        // sujuv kasvamine
        this.size += (target - this.size) * 0.06;

        this.draw(time);
    }
}

let flowers = [];

function createFlowers(){

    flowers = [];

    const amount = 70;

    for(let i = 0; i < amount; i++){

        flowers.push(
            new Flower(
                Math.random() * w,
                Math.random() * h,
                8 + Math.random() * 16
            )
        );
    }
}

function backgroundGlow(){

    const gradient = ctx.createRadialGradient(
        mouse.x,
        mouse.y,
        0,
        mouse.x,
        mouse.y,
        300
    );

    gradient.addColorStop(0, "rgba(255,80,80,0.08)");
    gradient.addColorStop(1, "rgba(255,0,0,0)");

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,w,h);
}

function animate(time){

    ctx.clearRect(0,0,w,h);

    // pehme läbipaistev kiht smooth efekti jaoks
    ctx.fillStyle = "rgba(20,0,0,0.18)";
    ctx.fillRect(0,0,w,h);

    backgroundGlow();

    flowers.forEach(flower => {
        flower.update(time);
    });

    requestAnimationFrame(animate);
}

createFlowers();
animate();
</script>

</body>
</html>
