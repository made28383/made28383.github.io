<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realistic MP3 Widget</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    overflow:hidden;
    width:100vw;
    height:100vh;
}

#player{
    position:fixed;
    left:40px;
    top:40px;
    width:640px;
    user-select:none;
    cursor:grab;
    z-index:9999;
}

#player.dragging{
    cursor:grabbing;
}

svg{
    width:100%;
    height:auto;
    overflow:visible;
}

.btn{
    cursor:pointer;
    transition:transform .08s ease;
}

.btn:active{
    transform:translateY(2px);
}

.screenText{
    fill:white;
    font-family:Arial, sans-serif;
    font-size:22px;
    letter-spacing:2px;
}

</style>
</head>
<body>

<div id="player">

<svg viewBox="0 0 1000 700">

<defs>

<linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#d07ab3"/>
<stop offset="55%" stop-color="#c65fa6"/>
<stop offset="100%" stop-color="#a74684"/>
</linearGradient>

<linearGradient id="bodyShadow" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#6f2956"/>
<stop offset="100%" stop-color="#522041"/>
</linearGradient>

<linearGradient id="innerRing" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#ff7ebf"/>
<stop offset="100%" stop-color="#d63f86"/>
</linearGradient>

<linearGradient id="goldBtn" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#f7ef9a"/>
<stop offset="50%" stop-color="#d9c95f"/>
<stop offset="100%" stop-color="#a59034"/>
</linearGradient>

<linearGradient id="goldShadow" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#7b6820"/>
<stop offset="100%" stop-color="#52420f"/>
</linearGradient>

<radialGradient id="sunGrad" cx="50%" cy="50%" r="60%">
<stop offset="0%" stop-color="#fff8c8"/>
<stop offset="40%" stop-color="#ffd24d"/>
<stop offset="100%" stop-color="#ff8c00"/>
</radialGradient>

<radialGradient id="sunGlow" cx="50%" cy="50%" r="80%">
<stop offset="0%" stop-color="rgba(255,200,70,.8)"/>
<stop offset="100%" stop-color="rgba(255,120,0,0)"/>
</radialGradient>

<filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
<feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000" flood-opacity="0.35"/>
</filter>

<filter id="btnShadow" x="-50%" y="-50%" width="200%" height="200%">
<feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#594513" flood-opacity="0.5"/>
</filter>

<filter id="sunBlur" x="-100%" y="-100%" width="300%" height="300%">
<feGaussianBlur stdDeviation="15"/>
</filter>

</defs>

<!-- MAIN BODY SHADOW -->
<path
