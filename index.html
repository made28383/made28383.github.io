<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w, h, dpr;

function resize(){

    dpr = window.devicePixelRatio || 1;

    w = window.innerWidth;
    h = window.innerHeight;

    canvas.width = w * dpr;
    canvas.height = h * dpr;

    canvas.style.width = w + "px";
    canvas.style.height = h + "px";

    ctx.setTransform(dpr,0,0,dpr,0,0);

    createFlowers();
}

window.addEventListener("resize", resize);

const mouse = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2
};

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

class Flower{

    constructor(x,y,size){

        this.x = x;
        this.y = y;

        this.baseSize = size;
        this.size = size;

        this.rotation =
            Math.random() * Math.PI * 2;

        this.petals =
            6 + Math.floor(Math.random() * 3);

        this.floatOffset =
            Math.random() * 1000;

        this.depth =
            0.4 + Math.random();

        this.sway =
            Math.random() * Math.PI * 2;

        // cached petal gradient
        this.gradient =
            ctx.createLinearGradient(
                0,0,0,size*2
            );

        this.gradient.addColorStop(
            0,
            "rgba(255,255,255,0.98)"
        );

        this.gradient.addColorStop(
            1,
            "rgba(255,220,220,0.9)"
        );
    }

    drawPetal(angle){

        ctx.save();

        ctx.rotate(angle);

        ctx.beginPath();

        ctx.moveTo(0,0);

        ctx.bezierCurveTo(
            this.size * 0.25,
            -this.size * 0.2,

            this.size * 0.8,
            this.size * 0.4,

            0,
            this.size * 1.7
        );

        ctx.bezierCurveTo(
            -this.size * 0.8,
            this.size * 0.4,

            -this.size * 0.25,
            -this.size * 0.2,

            0,
            0
        );

        ctx.fillStyle = this.gradient;

        // MUCH cheaper glow
        ctx.shadowColor =
            "rgba(255,255,255,0.35)";

        ctx.shadowBlur = 6;

        ctx.fill();

        ctx.restore();
    }

    draw(time){

        const floatY =
            Math.sin(
                time * 0.0015 +
                this.floatOffset
            ) * 4;

        const sway =
            Math.sin(
                time * 0.001 +
                this.sway
            ) * 0.08;

        // lightweight parallax
        const px =
            (mouse.x - w/2) *
            0.003 *
            this.depth;

        const py =
            (mouse.y - h/2) *
            0.003 *
            this.depth;

        ctx.save();

        ctx.translate(
            this.x + px,
            this.y + py + floatY
        );

        ctx.rotate(this.rotation + sway);

        for(let i=0;i<this.petals;i++){

            this.drawPetal(
                (Math.PI*2/this.petals)*i
            );
        }

        // center
        ctx.beginPath();

        ctx.arc(
            0,
            0,
            this.size * 0.28,
            0,
            Math.PI * 2
        );

        ctx.fillStyle = "#f6d66b";

        ctx.shadowBlur = 8;

        ctx.fill();

        ctx.restore();
    }

    update(time){

        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;

        // faster distance check
        const distSq = dx*dx + dy*dy;

        const radius = 170;

        let target = this.baseSize;

        if(distSq < radius * radius){

            const dist =
                Math.sqrt(distSq);

            const power =
                1 - dist / radius;

            target =
                this.baseSize +
                power *
                this.baseSize *
                1.8;
        }

        // FAST RESPONSE
        this.size +=
            (target - this.size) * 0.35;

        this.draw(time);
    }
}

class Particle{

    constructor(){

        this.reset();
    }

    reset(){

        this.x = Math.random() * w;
        this.y = Math.random() * h;

        this.size =
            Math.random() * 1.5;

        this.speed =
            0.1 + Math.random() * 0.4;

        this.alpha =
            0.03 + Math.random() * 0.1;
    }

    update(){

        this.y -= this.speed;

        if(this.y < -5){

            this.y = h + 5;
            this.x = Math.random() * w;
        }

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI * 2
        );

        ctx.fillStyle =
            `rgba(255,255,255,${this.alpha})`;

        ctx.fill();
    }
}

const flowers = [];
const particles = [];

function createFlowers(){

    flowers.length = 0;

    // optimized amount
    const amount =
        Math.min(
            70,
            Math.floor((w*h)/22000)
        );

    for(let i=0;i<amount;i++){

        flowers.push(
            new Flower(
                Math.random()*w,
                Math.random()*h,
                10 + Math.random()*14
            )
        );
    }

    particles.length = 0;

    for(let i=0;i<60;i++){

        particles.push(
            new Particle()
        );
    }
}

function backgroundGlow(){

    const gradient =
        ctx.createRadialGradient(
            mouse.x,
            mouse.y,
            0,
            mouse.x,
            mouse.y,
            240
        );

    gradient.addColorStop(
        0,
        "rgba(255,80,80,0.10)"
    );

    gradient.addColorStop(
        1,
        "rgba(255,0,0,0)"
    );

    ctx.fillStyle = gradient;

    ctx.fillRect(0,0,w,h);
}

function animate(time){

    // smoother trails
    ctx.fillStyle =
        "rgba(12,0,0,0.18)";

    ctx.fillRect(0,0,w,h);

    backgroundGlow();

    particles.forEach(p => p.update());

    flowers.forEach(f => {
        f.update(time);
    });

    requestAnimationFrame(animate);
}

resize();
animate();
</script>
