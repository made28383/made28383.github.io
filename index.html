<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Hover Effect</title>
    <style>
        body {
            background-color: darkred;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .flower {
            width: 100px;
            height: 100px;
            background-color: pink;
            border-radius: 50%;
            position: relative;
            margin: 20px;
            transition: transform 0.3s ease;
        }

        .flower:hover {
            transform: scale(1.5);
        }
    </style>
</head>
<body>
    <div class="flower"></div>
    <div class="flower"></div>
    <div class="flower"></div>

    <script>
        // You can add interactive features here if needed
    </script>
</body>
</html>
