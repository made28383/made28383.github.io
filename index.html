<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realistic Sun MP3 Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #111 url('https://www.transparenttextures.com/patterns/dark-matter.png');
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  #player-widget {
    position: fixed;
    bottom: 40px; right: 40px;
    width: 450px; height: 450px;
    cursor: grab; user-select: none;
    z-index: 9999;
  }

  /* 3D Realistic Button Styling */
  .btn-shape {
    cursor: pointer;
    transition: 0.1s;
    transform-box: fill-box;
    transform-origin: center;
  }
  .btn-shape:active { transform: scale(0.92); filter: brightness(0.8); }

  /* Sun Animation */
  @keyframes sunSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .playing #sun-rays { animation: sunSpin 20s linear infinite; transform-origin: center; }
  
  .lcd-text {
    font-family: 'Courier New', monospace;
    font-weight: bold;
    fill: #00ff00;
    pointer-events: none;
    text-shadow: 0 0 5px rgba(0,255,0,0.5);
  }
</style>
</head>
<body>

<div id="player-widget">
<svg id="player-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="puffy3d" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="0.8" specularExponent="20" lighting-color="#ffffff" result="specOut">
        <fePointLight x="-50" y="-100" z="200"/>
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>

    <radialGradient id="sunCoreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff700"/><stop offset="100%" stop-color="#ff8800"/>
    </radialGradient>

    <clipPath id="screenHole">
      <path d="M122.19,136.72c-3.46-6.12-1.68-13.4,0-20.23,3.4-13.86,12.37-22.19,15.27-24.81,12.96-11.72,28.03-13.44,37.4-14.5,7.61-.87,29.07-3,50,9.92,11.24,6.94,17.6,15.3,20.99,19.85,4.95,6.64,11.38,15.49,12.21,27.86.31,4.66.63,9.47-2.29,13.74-1.18,1.73-5.28,6.86-23.66,8.02-11.13.7-18.88-.6-30.15-2.29-21.22-3.18-7.48-.64-35.88-4.96-34.6-5.27-40.66-6.87-43.89-12.6Z" />
    </clipPath>
  </defs>

  <path id="main_frame" filter="url(#puffy3d)"
    d="M103.01,218.59c-26.84,2.6-45.87,8.38-62.25-3.34-16.75-11.98-18.98-33.85-19.33-39.75-.97-16.29,4.94-36.59,20.49-47.92,16.31-11.89,28.03-2.84,48.72-13.74,21.04-11.1,17.95-25.23,35.18-39.38,25.96-21.3,75.13-23.84,110.58-1.49,5.77,3.64,37.32,24.42,41.76,62.04,4.52,38.31-21.27,75.49-52.2,89.16-35.72,15.78-49.02-12.74-122.95-5.57Z"
    fill="#d6509d" stroke="#8b2d61" stroke-width="2" />

  <g clip-path="url(#screenHole)">
    <rect width="300" height="300" fill="#000" />
    
    <g id="sun-widget" transform="translate(205, 110)">
      <g id="sun-rays">
        <path d="M0,-35 Q-15,-45 -25,-30 T-35,-10 T-20,15 T5,35" fill="none" stroke="#ffaa00" stroke-width="4" opacity="0.7" transform="rotate(0)" />
        <path d="M0,-35 Q-15,-45 -25,-30 T-35,-10 T-20,15 T5,35" fill="none" stroke="#ffaa00" stroke-width="4" opacity="0.7" transform="rotate(45)" />
        <path d="M0,-35 Q-15,-45 -25,-30 T-35,-10 T-20,15 T5,35" fill="none" stroke="#ffaa00" stroke-width="4" opacity="0.7" transform="rotate(90)" />
        <path d="M0,-35 Q-15,-45 -25,-30 T-35,-10 T-20,15 T5,35" fill="none" stroke="#ffaa00" stroke-width="4" opacity="0.7" transform="rotate(180)" />
        <path d="M0,-35 Q-15,-45 -25,-30 T-35,-10 T-20,15 T5,35" fill="none" stroke="#ffaa00" stroke-width="4" opacity="0.7" transform="rotate(270)" />
      </g>
      <circle r="25" fill="url(#sunCoreGrad)" filter="url(#puffy3d)" />
      <path d="M-8,-8 Q0,0 8,8 T0,12" fill="none" stroke="#cc7700" stroke-width="2" stroke-linecap="round" />
    </g>

    <text x="145" y="115" class="lcd-text" font-size="7" id="track-display">LAUL - LAULJA</text>
    <text x="145" y="125" class="lcd-text" font-size="5" id="time-display">1:12 / 2:11</text>
    
    <line x1="145" y1="135" x2="240" y2="135" stroke="#333" stroke-width="2" stroke-linecap="round" />
    <line id="seeker-fill" x1="145" y1="135" x2="180" y2="135" stroke="#ffaa00" stroke-width="2" stroke-linecap="round" />
  </g>

  <g filter="url(#puffy3d)">
    <path id="play_btn" class="btn-shape" fill="#e8e880" d="M67.28,172.46c-2.36-5.35,3.69-11.89,10.68-12.17,6.43-.26,12.34,4.84,13.19,9.43.63,3.4-1.15,8.49-6.91,9.82-6.45,1.48-14.91-2.43-16.96-7.07Z"/>
    <path id="next_btn" class="btn-shape" fill="#e8e880" d="M79.26,155.43c-6.53-.35-11.93-11.85-10.15-18.4,2.37-8.71,17.38-9.57,20.08-2.11,2.28,6.3-2.49,20.92-9.93,20.51Z"/>
    <path id="rew_btn" class="btn-shape" fill="#e8e880" d="M63.47,171.1c.09-3.76-10.41-10.53-19.42-7.09-7.37,2.82-9.75,10.94-6.83,13.73,4.64,4.44,26.12-1.32,26.25-6.65Z"/>
    <path id="stop_btn" class="btn-shape" fill="#e8e880" d="M76.63,185.19c-4.97,3.72-7.28,17.9-5.22,24.13,3.1,9.38,17.22,3.94,18.27-5.22.88-7.58-6.49-23.82-13.05-18.91Z"/>
  </g>

  <g id="rainbow-vol" transform="translate(180, 190)">
    <path d="M0,20 A20,20 0 0,1 40,20" fill="none" stroke="red" stroke-width="3" />
    <path d="M3,20 A17,17 0 0,1 37,20" fill="none" stroke="orange" stroke-width="3" />
    <path d="M6,20 A14,14 0 0,1 34,20" fill="none" stroke="yellow" stroke-width="3" />
    <path d="M9,20 A11,11 0 0,1 31,20" fill="none" stroke="green" stroke-width="3" />
    <circle id="vol-knob" cx="20" cy="5" r="4" fill="#fff" filter="url(#puffy3d)" class="btn-shape" />
    <text x="20" y="32" text-anchor="middle" font-size="6" font-weight="bold" fill="#8b2d61">VOLUME</text>
  </g>

</svg>
</div>

<script>
const widget = document.getElementById('player-widget');
const playBtn = document.getElementById('play_btn');
let isPlaying = false;

playBtn.addEventListener('click', () => {
  isPlaying = !isPlaying;
  widget.classList.toggle('playing', isPlaying);
  document.getElementById('track-display').textContent = isPlaying ? '♪ PLAYING...' : '♪ PAUSED';
});

// Drag functionality
let dragging = false, offset = { x: 0, y: 0 };
widget.onmousedown = (e) => {
  if(e.target.closest('.btn-shape')) return;
  dragging = true;
  offset.x = e.clientX - widget.offsetLeft;
  offset.y = e.clientY - widget.offsetTop;
};
document.onmousemove = (e) => {
  if (!dragging) return;
  widget.style.left = (e.clientX - offset.x) + 'px';
  widget.style.top = (e.clientY - offset.y) + 'px';
  widget.style.right = 'auto'; widget.style.bottom = 'auto';
};
document.onmouseup = () => dragging = false;
</script>
</body>
</html>
